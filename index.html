<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Fiscalización - Venezuela</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f0f2f5; --primary: #1a2a6c; --accent: #f2a900; --card: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 240px; background: var(--primary); color: white; height: 100vh; padding: 20px; position: fixed; }
        .main { margin-left: 240px; flex: 1; padding: 20px; }
        .kpi-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .kpi-card { border-top: 4px solid var(--accent); text-align: center; }
        .chart-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; font-size: 0.9rem; }
        th { background: #f8f9fa; color: #555; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>
    <div id="loading">Conectando con Google Sheets...</div>
    
    <div class="sidebar">
        <h2>Fiscalización</h2>
        <p>Monitoreo de Denuncias</p>
    </div>

    <div class="main">
        <div class="kpi-container">
            <div class="card kpi-card"><h3>Recibidos</h3><div id="kpi-recibidos" style="font-size: 24px; font-weight: bold;">0</div></div>
            <div class="card kpi-card"><h3>Admitidas</h3><div id="kpi-admitidas" style="font-size: 24px; font-weight: bold;">0</div></div>
            <div class="card kpi-card"><h3>Inspeccionadas</h3><div id="kpi-inspec" style="font-size: 24px; font-weight: bold;">0</div></div>
            <div class="card kpi-card"><h3>Atendidas %</h3><div id="kpi-porcentaje" style="font-size: 24px; font-weight: bold;">0%</div></div>
        </div>

        <div class="chart-grid">
            <div class="card"><h3>Denuncias por Estado</h3><canvas id="barChart"></canvas></div>
            <div class="card"><h3>Distribución</h3><canvas id="pieChart"></canvas></div>
        </div>

        <div class="card">
            <h3>Detalle de Registros</h3>
            <div id="table-data" style="overflow-x: auto;"></div>
        </div>
    </div>

    <script>
        // Configuración basada en tu link 
        const sheetId = '19TiaUO98LcDaVshi2Tb9CJdrmvt08w2nXHrYkrJVLkQ';
        const queryUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=Hoja 1`;

        async function init() {
            try {
                const response = await fetch(queryUrl);
                let text = await response.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                const data = json.table.rows.map(r => r.c.map(c => c ? (c.f || c.v) : ''));
                const headers = json.table.cols.map(c => c.label);

                renderDashboard(headers, data);
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                document.getElementById('loading').innerHTML = "Error de conexión. Verifica que el archivo sea público.";
            }
        }

        function renderDashboard(headers, rows) {
            // Mapeo de columnas según tu imagen 2
            const idxRecibidos = headers.indexOf('REGISTROS RECIBIDOS');
            const idxAdmitidas = headers.indexOf('DENUNCIAS ADMITIDAS');
            const idxInspec = headers.indexOf('INSPECCIONADO');
            const idxEstado = headers.indexOf('ESTADO');

            let totalRecibidos = 0, totalAdmitidas = 0, totalInspec = 0;
            let estadosMap = {};

            rows.forEach(row => {
                totalRecibidos += Number(row[idxRecibidos]) || 0;
                totalAdmitidas += Number(row[idxAdmitidas]) || 0;
                totalInspec += Number(row[idxInspec]) || 0;
                
                let est = row[idxEstado];
                estadosMap[est] = (estadosMap[est] || 0) + (Number(row[idxAdmitidas]) || 0);
            });

            // Actualizar KPIs
            document.getElementById('kpi-recibidos').innerText = totalRecibidos;
            document.getElementById('kpi-admitidas').innerText = totalAdmitidas;
            document.getElementById('kpi-inspec').innerText = totalInspec;
            document.getElementById('kpi-porcentaje').innerText = totalRecibidos > 0 ? ((totalAdmitidas/totalRecibidos)*100).toFixed(1) + '%' : '0%';

            // Renderizar Tabla
            let html = '<table><thead><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
            rows.slice(0, 10).forEach(row => {
                html += '<tr>' + row.map(cell => `<td>${cell}</td>`).join('') + '</tr>';
            });
            document.getElementById('table-data').innerHTML = html + '</tbody></table>';

            // Gráfico de Barras
            new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(estadosMap),
                    datasets: [{ label: 'Admitidas', data: Object.values(estadosMap), backgroundColor: '#1a2a6c' }]
                }
            });
        }
        init();
    </script>
</body>
</html>
