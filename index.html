<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte Detallado de Gestión | Base de Datos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <div class="mb-10 text-center md:text-left">
            <h1 class="text-4xl font-black text-slate-800 uppercase tracking-tighter">Panel de Control General</h1>
            <p class="text-slate-500 font-medium">Visualización completa de datos por zona geográfica</p>
        </div>

        <div id="global-kpis" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
            <div class="bg-white p-6 rounded-2xl shadow-sm">
                <h3 class="font-bold text-slate-700 mb-4 uppercase text-xs tracking-widest">Resumen Atenciones</h3>
                <div id="main-donut"></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm">
                <h3 class="font-bold text-slate-700 mb-4 uppercase text-xs tracking-widest">Carga por Estado (Recibidas)</h3>
                <div id="main-bar"></div>
            </div>
        </div>

        <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
            <i class="fas fa-list-ul text-indigo-600"></i> Desglose Detallado por Estado
        </h2>
        <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/19TiaUO98LcDaVshi2Tb9CJdrmvt08w2nXHrYkrJVLkQ/gviz/tq?tqx=out:json&sheet=Hoja%201';

        async function init() {
            const res = await fetch(SHEET_URL);
            const text = await res.text();
            const json = JSON.parse(text.substring(47, text.length - 2));
            render(json.table.rows);
        }

        function n(val) {
            if (!val || val.v === null) return 0;
            return typeof val.v === 'number' ? val.v : parseFloat(val.v.toString().replace(/[^0-9.]/g, '')) || 0;
        }

        function render(rows) {
            const container = document.getElementById('cards-container');
            const kpiContainer = document.getElementById('global-kpis');
            
            let gRec = 0, gAtend = 0, gPend = 0, gAdm = 0;
            const estadosArr = [], recibidasArr = [];

            rows.forEach((row) => {
                const c = row.c;
                const nombre = c[0] ? c[0].v : "";

                // Filtrar solo filas con datos reales de estados
                if (nombre && !["ESTADO", "TOTALES", "TOTAL"].includes(nombre.toUpperCase())) {
                    const rec = n(c[4]), adm = n(c[5]), noAdm = n(c[6]), arch = n(c[8]), insp = n(c[9]), conc = n(c[10]), fisc = n(c[11]), atend = n(c[12]), pend = n(c[13]);

                    gRec += rec; gAtend += atend; gPend += pend; gAdm += adm;
                    estadosArr.push(nombre);
                    recibidasArr.push(rec);

                    // Crear Card para este estado
                    container.innerHTML += `
                        <div class="bg-white rounded-2xl shadow-sm hover:shadow-md transition-shadow overflow-hidden border border-gray-100">
                            <div class="bg-slate-800 p-4">
                                <h3 class="text-white font-bold uppercase tracking-tight">${nombre}</h3>
                            </div>
                            <div class="p-5">
                                <div class="flex justify-between items-end mb-4">
                                    <div>
                                        <p class="text-[10px] font-bold text-gray-400 uppercase leading-none">Recibidas</p>
                                        <p class="text-2xl font-black text-slate-800">${rec.toLocaleString()}</p>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-[10px] font-bold text-gray-400 uppercase leading-none">Eficiencia</p>
                                        <p class="text-lg font-bold text-indigo-600">${rec > 0 ? ((atend/rec)*100).toFixed(1) : 0}%</p>
                                    </div>
                                </div>
                                
                                <div class="space-y-3">
                                    <div class="flex justify-between text-sm border-b pb-1">
                                        <span class="text-gray-500"><i class="fas fa-check-double text-emerald-500 mr-2"></i>Atendidas</span>
                                        <span class="font-bold text-slate-700">${atend.toLocaleString()}</span>
                                    </div>
                                    <div class="flex justify-between text-sm border-b pb-1">
                                        <span class="text-gray-500"><i class="fas fa-clock text-orange-500 mr-2"></i>Por Atender</span>
                                        <span class="font-bold text-slate-700">${pend.toLocaleString()}</span>
                                    </div>
                                    <div class="flex justify-between text-sm border-b pb-1">
                                        <span class="text-gray-500"><i class="fas fa-file-signature text-blue-500 mr-2"></i>Admitidas</span>
                                        <span class="font-bold text-slate-700">${adm.toLocaleString()}</span>
                                    </div>
                                </div>

                                <div class="mt-4 grid grid-cols-3 gap-2 text-center pt-2">
                                    <div class="bg-gray-50 p-2 rounded-lg">
                                        <p class="text-[9px] font-bold text-gray-400 uppercase">Insp.</p>
                                        <p class="font-bold text-slate-700 text-xs">${insp}</p>
                                    </div>
                                    <div class="bg-gray-50 p-2 rounded-lg">
                                        <p class="text-[9px] font-bold text-gray-400 uppercase">Conc.</p>
                                        <p class="font-bold text-slate-700 text-xs">${conc}</p>
                                    </div>
                                    <div class="bg-gray-50 p-2 rounded-lg">
                                        <p class="text-[9px] font-bold text-gray-400 uppercase">Fisc.</p>
                                        <p class="font-bold text-slate-700 text-xs">${fisc}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });

            // Pintar KPIs Globales
            const kpiData = [
                {lab: 'Recibidas', val: gRec, col: 'indigo'},
                {lab: 'Atendidas', val: gAtend, col: 'emerald'},
                {lab: 'Por Atender', val: gPend, col: 'orange'},
                {lab: 'Admitidas', val: gAdm, col: 'blue'}
            ];
            kpiContainer.innerHTML = kpiData.map(k => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-${k.col}-500">
                    <p class="text-xs font-bold text-gray-400 uppercase">${k.lab}</p>
                    <p class="text-3xl font-black text-slate-800">${k.val.toLocaleString()}</p>
                </div>
            `).join('');

            // Gráficos
            new ApexCharts(document.querySelector("#main-donut"), {
                series: [gAtend, gPend],
                chart: { type: 'donut', height: 300 },
                labels: ['Atendidas', 'Pendientes'],
                colors: ['#10b981', '#f97316'],
                legend: { position: 'bottom' }
            }).render();

            new ApexCharts(document.querySelector("#main-bar"), {
                series: [{ name: 'Recibidas', data: recibidasArr }],
                chart: { type: 'bar', height: 300, toolbar: {show:false} },
                xaxis: { categories: estadosArr },
                colors: ['#6366f1'],
                plotOptions: { bar: { borderRadius: 4 } }
            }).render();
        }

        init();
    </script>
</body>
</html>
