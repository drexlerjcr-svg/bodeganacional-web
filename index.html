<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Mando Operativa - Dashboard Ejecutivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #f1f5f9; --card-bg: #ffffff;
            --primary: #1e3a8a; --accent: #3b82f6;
            --success: #22c55e; --danger: #ef4444; --warning: #f59e0b;
            --text-main: #1e293b; --text-muted: #64748b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-body); margin: 0; color: var(--text-main); }
        .app-layout { display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR DE ESTADOS */
        .sidebar { width: 280px; background: var(--card-bg); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px 20px; font-weight: 800; font-size: 0.8rem; color: var(--primary); text-transform: uppercase; border-bottom: 2px solid var(--bg-body); }
        .state-scroll { overflow-y: auto; flex-grow: 1; padding: 10px; }
        .state-btn { 
            padding: 12px 15px; margin-bottom: 4px; border-radius: 8px; cursor: pointer; 
            font-size: 0.8rem; font-weight: 700; color: var(--text-muted); transition: 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .state-btn:hover { background: #f8fafc; color: var(--primary); }
        .state-btn.active { background: var(--primary); color: white; box-shadow: var(--shadow); }

        /* CONTENIDO PRINCIPAL */
        .viewport { flex-grow: 1; padding: 25px 35px; overflow-y: auto; }
        
        /* BANNER PRINCIPAL */
        .hero-banner { 
            background: var(--primary); color: white; padding: 25px 30px; border-radius: 12px; 
            margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow);
        }
        .hero-banner h1 { margin: 0; font-size: 1.5rem; letter-spacing: 1px; text-transform: uppercase; }

        /* SECCIONES Y ETIQUETAS */
        .section-tag { 
            font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; 
            margin-bottom: 15px; display: flex; align-items: center; gap: 10px;
        }
        .section-tag::before { content: ''; width: 4px; height: 16px; background: var(--warning); border-radius: 2px; }

        /* GRID DE KPIs SUPERIORES */
        .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 35px; }
        .kpi-card { 
            background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0;
            box-shadow: var(--shadow); border-top: 5px solid #cbd5e1;
        }
        .kpi-card.blue { border-top-color: var(--accent); }
        .kpi-card.green { border-top-color: var(--success); }
        .kpi-card.red { border-top-color: var(--danger); }
        .kpi-num { font-size: 2.5rem; font-weight: 800; line-height: 1; display: block; margin-bottom: 10px; }
        .kpi-desc { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }

        /* GRID DE ESTATUS (CARDS INDEPENDIENTES) */
        .status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .status-card { 
            background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0;
            box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 12px;
        }
        .status-card-head { display: flex; justify-content: space-between; align-items: center; }
        .status-icon-box { width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .status-label { font-size: 0.75rem; font-weight: 800; color: var(--text-main); text-transform: uppercase; }
        .status-val-big { font-size: 1.5rem; font-weight: 800; }
        
        /* BARRAS DE PROGRESO INTERNAS */
        .progress-container { width: 100%; height: 8px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; transition: width 0.8s ease; }

        #loader { position: fixed; inset: 0; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loader"><i class="fas fa-spinner fa-spin fa-3x" style="color: var(--primary)"></i></div>

<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header">Filtro por Ubicación</div>
        <div class="state-scroll" id="sidebar-list">
            <div class="state-btn active" onclick="resetToNational(this)">
                <span>NACIONAL (TOTAL)</span>
                <i class="fas fa-globe"></i>
            </div>
        </div>
    </aside>

    <main class="viewport">
        <div class="hero-banner">
            <div>
                <h1 id="main-title">VENEZUELA (TOTAL NACIONAL)</h1>
                <div style="font-size: 0.8rem; opacity: 0.8; margin-top: 5px;">Sala de Seguimiento Operativo 2026</div>
            </div>
            <i class="fas fa-chart-line fa-2x" style="opacity: 0.4"></i>
        </div>

        <div class="section-tag">Resumen General del Operativo</div>
        <div class="kpi-row">
            <div class="kpi-card blue">
                <span class="kpi-num" id="kpi-recibidos" style="color: var(--primary)">0</span>
                <span class="kpi-desc">Registros Recibidos</span>
            </div>
            <div class="kpi-card green">
                <span class="kpi-num" id="kpi-atendidas" style="color: var(--success)">0</span>
                <span class="kpi-desc">Denuncias Atendidas</span>
            </div>
            <div class="kpi-card red">
                <span class="kpi-num" id="kpi-pendientes" style="color: var(--danger)">0</span>
                <span class="kpi-desc">Pendientes por Atender</span>
            </div>
        </div>

        <div class="section-tag">Detalle de Estatus por Categoría</div>
        <div class="status-grid" id="status-container">
            </div>
    </main>
</div>

<script>
    const url = "https://docs.google.com/spreadsheets/d/19TiaUO98LcDaVshi2Tb9CJdrmvt08w2nXHrYkrJVLkQ/gviz/tq?tqx=out:json&sheet=Hoja 1";
    let fullData = [];

    async function fetchData() {
        try {
            const res = await fetch(url);
            const text = await res.text();
            const json = JSON.parse(text.substring(47).slice(0, -2));
            const cols = json.table.cols.map(c => c.label ? c.label.toUpperCase().trim() : "");
            
            fullData = json.table.rows.map(r => {
                let row = {};
                r.c.forEach((cell, i) => { if(cols[i]) row[cols[i]] = cell ? (cell.f || cell.v) : 0; });
                return row;
            });

            populateSidebar();
            renderDashboard(fullData);
            document.getElementById('loader').style.display = 'none';
        } catch (e) { console.error("Error cargando data:", e); }
    }

    function populateSidebar() {
        const list = document.getElementById('sidebar-list');
        const uniqueStates = [...new Set(fullData.map(d => d['ESTADO']))].filter(Boolean).sort();
        
        uniqueStates.forEach(state => {
            const div = document.createElement('div');
            div.className = 'state-btn';
            div.innerHTML = `<span>${state}</span><i class="fas fa-chevron-right" style="font-size:0.6rem"></i>`;
            div.onclick = () => {
                const filtered = fullData.filter(d => d['ESTADO'] === state);
                renderDashboard(filtered, state);
                document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
                div.classList.add('active');
            };
            list.appendChild(div);
        });
    }

    function renderDashboard(data, title = "VENEZUELA (TOTAL NACIONAL)") {
        let s = { rec: 0, ate: 0, pen: 0, cer: 0, ins: 0, apr: 0, des: 0, con: 0, adm: 0 };
        
        data.forEach(d => {
            s.rec += Number(d['REGISTROS RECIBIDOS']) || 0;
            s.ate += Number(d['ATENDIDAS']) || 0;
            s.pen += Number(d['POR ATENDER']) || 0;
            s.cer += Number(d['CERRADO']) || 0;
            s.ins += Number(d['INSPECCIONADO']) || 0;
            s.apr += Number(d['POR APROBAR FISCALIZACIÓN']) || 0;
            s.des += Number(d['DESESTIMADA']) || 0;
            s.con += Number(d['PROCESO CONCILIATORIO']) || 0;
            s.adm += Number(d['DENUNCIA ADMITIDA']) || 0;
        });

        document.getElementById('main-title').innerText = title;
        document.getElementById('kpi-recibidos').innerText = s.rec.toLocaleString();
        document.getElementById('kpi-atendidas').innerText = s.ate.toLocaleString();
        document.getElementById('kpi-pendientes').innerText = s.pen.toLocaleString();

        const categories = [
            { label: 'Cerradas', val: s.cer, icon: 'fa-check-circle', color: '#1e3a8a' },
            { label: 'Inspeccionadas', val: s.ins, icon: 'fa-search', color: '#3b82f6' },
            { label: 'Por Aprobar', val: s.apr, icon: 'fa-user-clock', color: '#f59e0b' },
            { label: 'Desestimadas', val: s.des, icon: 'fa-ban', color: '#ef4444' },
            { label: 'Conciliatorio', val: s.con, icon: 'fa-comments', color: '#10b981' },
            { label: 'Admitidas', val: s.adm, icon: 'fa-file-signature', color: '#8b5cf6' }
        ];

        const max = Math.max(...categories.map(c => c.val)) || 1;
        document.getElementById('status-container').innerHTML = categories.map(c => `
            <div class="status-card">
                <div class="status-card-head">
                    <span class="status-label">${c.label}</span>
                    <div class="status-icon-box" style="background:${c.color}15; color:${c.color}">
                        <i class="fas ${c.icon}"></i>
                    </div>
                </div>
                <div class="status-val-big" style="color:${c.color}">${c.val.toLocaleString()}</div>
                <div class="progress-container">
                    <div class="progress-fill" style="width:${(c.val/max)*100}%; background:${c.color}"></div>
                </div>
            </div>
        `).join('');
    }

    function resetToNational(el) {
        renderDashboard(fullData);
        document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    fetchData();
</script>
</body>
</html>
