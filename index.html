<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Mando Operativa Completa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #f1f5f9; --card-bg: #ffffff;
            --primary: #1e3a8a; --accent: #3b82f6;
            --success: #22c55e; --danger: #ef4444; --warning: #f59e0b;
            --purple: #8b5cf6; --text-main: #1e293b; --text-muted: #64748b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-body); margin: 0; color: var(--text-main); }
        .app-layout { display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 260px; min-width: 260px; background: var(--card-bg); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px 20px; font-weight: 800; font-size: 0.8rem; color: var(--primary); text-transform: uppercase; border-bottom: 2px solid var(--bg-body); }
        .state-scroll { overflow-y: auto; flex-grow: 1; padding: 10px; }
        .state-btn { 
            padding: 10px 15px; margin-bottom: 4px; border-radius: 8px; cursor: pointer; 
            font-size: 0.75rem; font-weight: 700; color: var(--text-muted); transition: 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .state-btn:hover { background: #f8fafc; color: var(--primary); }
        .state-btn.active { background: var(--primary); color: white; box-shadow: var(--shadow); }

        /* CONTENIDO PRINCIPAL */
        .viewport { flex-grow: 1; padding: 20px 30px; overflow-y: auto; }
        
        .hero-banner { 
            background: var(--primary); color: white; padding: 20px 25px; border-radius: 12px; 
            margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow);
        }
        .hero-banner h1 { margin: 0; font-size: 1.3rem; text-transform: uppercase; }

        .section-tag { 
            font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; 
            margin: 25px 0 15px 0; display: flex; align-items: center; gap: 10px;
        }
        .section-tag::before { content: ''; width: 4px; height: 16px; background: var(--warning); border-radius: 2px; }

        /* GRIDS */
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
        
        /* CARD ESTILO INDIVIDUAL */
        .card { 
            background: var(--card-bg); padding: 18px; border-radius: 12px; border: 1px solid #e2e8f0;
            box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 8px;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-3px); }
        
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }
        .card-label { font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; line-height: 1.2; }
        .card-val { font-size: 1.6rem; font-weight: 800; color: var(--text-main); }
        
        /* BARRAS */
        .progress-box { width: 100%; height: 6px; background: #f1f5f9; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .progress-bar { height: 100%; border-radius: 10px; transition: width 0.8s ease; }

        #loader { position: fixed; inset: 0; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loader"><i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--primary)"></i></div>

<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header">Filtro Territorial</div>
        <div class="state-scroll" id="sidebar-list">
            <div class="state-btn active" onclick="resetToNational(this)">
                <span>NACIONAL (TOTAL)</span>
                <i class="fas fa-globe"></i>
            </div>
        </div>
    </aside>

    <main class="viewport">
        <div class="hero-banner">
            <div>
                <h1 id="main-title">VENEZUELA</h1>
                <div style="font-size: 0.8rem; opacity: 0.8;">Consolidado General de Fiscalización</div>
            </div>
            <i class="fas fa-shield-alt fa-2x" style="opacity: 0.3"></i>
        </div>

        <div class="section-tag">Indicadores Críticos</div>
        <div class="grid-cards" id="grid-principales"></div>

        <div class="section-tag">Estatus y Flujo de Denuncias</div>
        <div class="grid-cards" id="grid-estatus"></div>

        <div class="section-tag">Gestión de Fiscales y Dependencias</div>
        <div class="grid-cards" id="grid-fiscales"></div>

        <div class="section-tag">Análisis de Rendimiento (%)</div>
        <div class="grid-cards" id="grid-porcentajes"></div>
        
        <div style="height: 40px;"></div>
    </main>
</div>

<script>
    const url = "https://docs.google.com/spreadsheets/d/19TiaUO98LcDaVshi2Tb9CJdrmvt08w2nXHrYkrJVLkQ/gviz/tq?tqx=out:json&sheet=Hoja 1";
    let fullData = [];

    async function fetchData() {
        try {
            const res = await fetch(url);
            const text = await res.text();
            const json = JSON.parse(text.substring(47).slice(0, -2));
            const cols = json.table.cols.map(c => c.label ? c.label.toUpperCase().trim() : "");
            
            fullData = json.table.rows.map(r => {
                let row = {};
                r.c.forEach((cell, i) => { if(cols[i]) row[cols[i]] = cell ? (cell.f || cell.v) : 0; });
                return row;
            });

            populateSidebar();
            renderDashboard(fullData);
            document.getElementById('loader').style.display = 'none';
        } catch (e) { console.error(e); }
    }

    function populateSidebar() {
        const list = document.getElementById('sidebar-list');
        const states = [...new Set(fullData.map(d => d['ESTADO']))].filter(Boolean).sort();
        states.forEach(s => {
            const div = document.createElement('div');
            div.className = 'state-btn';
            div.innerHTML = `<span>${s}</span><i class="fas fa-chevron-right" style="font-size:0.5rem"></i>`;
            div.onclick = () => {
                renderDashboard(fullData.filter(d => d['ESTADO'] === s), s);
                document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
                div.classList.add('active');
            };
            list.appendChild(div);
        });
    }

    function createCard(label, value, icon, color, isPercent = false) {
        const valDisplay = isPercent ? (typeof value === 'number' ? value.toFixed(1) : value) + '%' : Number(value).toLocaleString();
        const barWidth = isPercent ? value : 100;
        return `
            <div class="card">
                <div class="card-top">
                    <span class="card-label">${label}</span>
                    <div class="card-icon" style="background:${color}15; color:${color}"><i class="fas ${icon}"></i></div>
                </div>
                <div class="card-val" style="color:${color}">${valDisplay}</div>
                <div class="progress-box"><div class="progress-bar" style="width:${barWidth}%; background:${color}"></div></div>
            </div>
        `;
    }

    function renderDashboard(data, title = "VENEZUELA") {
        let s = {};
        // Inicializar todas las claves en 0
        const keys = ["REGISTROS RECIBIDOS", "ATENDIDAS", "POR ATENDER", "DENUNCIAS NO ADMITIDAS", "NUEVO", "DENUNCIAS ADMITIDAS", "INSPECCIONADO", "PROCESO CONCILIATORIO", "CENTRALIZADA", "POR APROBAR FISCALIZACIÓN", "DESESTIMADA", "POR FISCALIZAR", "PROCESO CULMINADO", "ATENDIDA", "CERRADO", "POR ASIGNAR FISCAL", "DIRECTOR DE FISCALIZACIÓN", "CON FISCAL ASIGNADO", "CON FISCAL NACIONAL", "OTRA DEPENDENCI"];
        keys.forEach(k => s[k] = 0);

        data.forEach(d => { keys.forEach(k => { s[k] += Number(d[k]) || 0; }); });

        document.getElementById('main-title').innerText = title;

        // 1. PRINCIPALES
        document.getElementById('grid-principales').innerHTML = 
            createCard("Registros Recibidos", s["REGISTROS RECIBIDOS"], "fa-folder-open", "#1e3a8a") +
            createCard("Atendidas (Total)", s["ATENDIDAS"], "fa-check-circle", "#22c55e") +
            createCard("Por Atender", s["POR ATENDER"], "fa-clock", "#ef4444");

        // 2. ESTATUS
        document.getElementById('grid-estatus').innerHTML = 
            createCard("Nuevos", s["NUEVO"], "fa-plus-circle", "#3b82f6") +
            createCard("Admitidas", s["DENUNCIA ADMITIDAS"] || s["DENUNCIAS ADMITIDAS"], "fa-file-import", "#8b5cf6") +
            createCard("No Admitidas", s["DENUNCIAS NO ADMITIDAS"], "fa-ban", "#64748b") +
            createCard("Inspeccionado", s["INSPECCIONADO"], "fa-search", "#0ea5e9") +
            createCard("Conciliatorio", s["PROCESO CONCILIATORIO"], "fa-handshake", "#10b981") +
            createCard("Por Aprobar", s["POR APROBAR FISCALIZACIÓN"], "fa-user-check", "#f59e0b") +
            createCard("Desestimada", s["DESESTIMADA"], "fa-times-circle", "#f43f5e") +
            createCard("Por Fiscalizar", s["POR FISCALIZAR"], "fa-clipboard-list", "#6366f1") +
            createCard("Cerrado", s["CERRADO"], "fa-archive", "#1e293b");

        // 3. FISCALES
        document.getElementById('grid-fiscales').innerHTML = 
            createCard("Por Asignar Fiscal", s["POR ASIGNAR FISCAL"], "fa-user-plus", "#d97706") +
            createCard("Con Fiscal Asignado", s["CON FISCAL ASIGNADO"], "fa-user-tie", "#059669") +
            createCard("Fiscal Nacional", s["CON FISCAL NACIONAL"], "fa-landmark", "#4338ca") +
            createCard("Director Fiscalización", s["DIRECTOR DE FISCALIZACIÓN"], "fa-user-shield", "#be185d") +
            createCard("Otra Dependencia", s["OTRA DEPENDENCI"] || s["OTRA DEPENDENCIA"], "fa-external-link-alt", "#475569");

        // 4. PORCENTAJES (Cálculo manual basado en registros recibidos)
        const pAte = s["REGISTROS RECIBIDOS"] > 0 ? (s["ATENDIDAS"] / s["REGISTROS RECIBIDOS"]) * 100 : 0;
        const pPen = s["REGISTROS RECIBIDOS"] > 0 ? (s["POR ATENDER"] / s["REGISTROS RECIBIDOS"]) * 100 : 0;
        
        document.getElementById('grid-porcentajes').innerHTML = 
            createCard("Atención %", pAte, "fa-percentage", "#22c55e", true) +
            createCard("Por Atender %", pPen, "fa-percentage", "#ef4444", true);
    }

    function resetToNational(el) {
        renderDashboard(fullData);
        document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    fetchData();
</script>
</body>
</html>
