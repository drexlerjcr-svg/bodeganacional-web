<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Mando Operativa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #1e3a8a; --accent: #3b82f6; --bg: #f1f5f9; --white: #ffffff;
            --text: #1e293b; --muted: #64748b; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--text); height: 100vh; overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100vw; position: relative; }
        
        /* Sidebar y Menú */
        .sidebar { 
            width: 280px; background: var(--white); border-right: 1px solid #e2e8f0; 
            display: flex; flex-direction: column; z-index: 1001; transition: 0.3s;
        }
        .sidebar.collapsed { margin-left: -280px; }

        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100%; width: 80%; }
            .sidebar.collapsed { margin-left: -100%; }
            .charts-row { grid-template-columns: 1fr !important; gap: 15px !important; }
        }

        .sidebar-header { padding: 20px; background: var(--primary); color: white; display: flex; align-items: center; gap: 15px; }
        .sidebar-content { overflow-y: auto; flex-grow: 1; }
        .state-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #f1f5f9; font-weight: 600; color: var(--muted); }
        .state-item.active { background: var(--primary); color: white; }

        /* Contenido Principal */
        .main-view { flex-grow: 1; padding: 20px; overflow-y: auto; position: relative; }
        .floating-toggle { 
            position: fixed; top: 15px; left: 15px; z-index: 1000; 
            background: var(--primary); color: white; border: none; 
            width: 40px; height: 40px; border-radius: 8px; display: none;
        }
        @media (max-width: 768px) { .floating-toggle { display: block; } }

        .banner { background: linear-gradient(135deg, #1e3a8a, #3b82f6); color: white; padding: 25px; border-radius: 15px; margin-bottom: 25px; }
        @media (max-width: 768px) { .banner { padding-top: 60px; text-align: center; } }

        /* Grid de Tarjetas */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border: 1px solid #e2e8f0; }
        .card-label { font-size: 0.7rem; font-weight: 800; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 5px; }
        .card-val { font-size: 1.8rem; font-weight: 800; color: var(--primary); }

        /* GRÁFICOS CORREGIDOS */
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .chart-container { 
            background: var(--white); padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; 
            box-shadow: var(--shadow); display: flex; flex-direction: column; align-items: center;
        }
        .chart-container h3 { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; margin-bottom: 15px; }
        
        /* Contenedor dinámico del canvas */
        .chart-box { 
            position: relative; 
            width: 100%; 
            max-width: 250px; /* Limita el tamaño en desktop */
            aspect-ratio: 1 / 1; /* Mantiene el círculo perfecto */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #auth-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 5000; }
        .auth-card { background: white; padding: 30px; border-radius: 20px; text-align: center; }
        .pin-input { width: 100%; padding: 12px; font-size: 1.5rem; text-align: center; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2>PIN DE ACCESO</h2>
        <input type="password" id="pin-input" class="pin-input" maxlength="4">
        <button onclick="checkAuth()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">ENTRAR</button>
    </div>
</div>

<div class="app-container" id="app" style="opacity:0">
    <aside class="sidebar collapsed" id="sidebar">
        <div class="sidebar-header"><i class="fas fa-times" onclick="toggleSidebar()"></i> <span>ESTADOS</span></div>
        <div class="sidebar-content" id="sidebar-list"></div>
    </aside>

    <button class="floating-toggle" id="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

    <main class="main-view">
        <div class="banner">
            <h1 id="view-title">VENEZUELA</h1>
            <small id="date-info">Sincronizando...</small>
        </div>

        <div class="grid" id="grid-stats"></div>

        <div class="charts-row">
            <div class="chart-container">
                <h3>Atención vs Pendientes</h3>
                <div class="chart-box"><canvas id="chartAtencion"></canvas></div>
            </div>
            <div class="chart-container">
                <h3>Asignación de Fiscales</h3>
                <div class="chart-box"><canvas id="chartFiscales"></canvas></div>
            </div>
        </div>
    </main>
</div>

<script>
    const url = atob("aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvMTlUaWFVTzk4TGNEYVZzaGkyVGI5Q0pkcm12dDA4dzJuWEhyWWtySlZMa1EvZ3Zpei90cT90cXg9b3V0Ompzb24mc2hlZXQ9SG9qYSUyMDE=");
    let allData = [];
    let chartA, chartF;

    function toggleSidebar() { 
        const sb = document.getElementById('sidebar');
        sb.classList.toggle('collapsed');
        document.getElementById('menu-btn').style.display = sb.classList.contains('collapsed') ? 'block' : 'none';
    }

    function checkAuth() {
        if (document.getElementById('pin-input').value === "1793") {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('app').style.opacity = '1';
            init();
        }
    }

    async function init() {
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.substring(47).slice(0, -2));
        const cols = json.table.cols.map(c => c.label.toUpperCase());
        allData = json.table.rows.map(r => {
            let obj = {};
            r.c.forEach((cell, i) => { if(cols[i]) obj[cols[i]] = cell ? (cell.f || cell.v) : 0; });
            return obj;
        }).filter(d => d.ESTADO && !['TOTAL', 'TOTALES'].includes(String(d.ESTADO).toUpperCase()));

        renderSidebar();
        updateDashboard(allData, "VENEZUELA");
    }

    function renderSidebar() {
        const list = document.getElementById('sidebar-list');
        const states = [...new Set(allData.map(d => d.ESTADO))].sort();
        states.forEach(s => {
            const div = document.createElement('div');
            div.className = 'state-item';
            div.innerHTML = s;
            div.onclick = () => {
                updateDashboard(allData.filter(d => d.ESTADO === s), s);
                if(window.innerWidth <= 768) toggleSidebar();
            };
            list.appendChild(div);
        });
    }

    function updateDashboard(data, title) {
        const sum = (col) => data.reduce((acc, curr) => acc + parseFloat(String(curr[col]).replace(/\./g,'').replace(',','.') || 0), 0);
        
        const rec = sum("REGISTROS RECIBIDOS");
        const ate = sum("ATENDIDAS");
        const pen = sum("POR ATENDER");
        const pas = sum("POR ASIGNAR FISCAL");
        const cas = sum("CON FISCAL ASIGNADO");

        document.getElementById('view-title').innerText = title;
        document.getElementById('grid-stats').innerHTML = `
            <div class="card"><span class="card-label">Recibidos</span><div class="card-val">${Math.floor(rec).toLocaleString()}</div></div>
            <div class="card"><span class="card-label">Atendidas</span><div class="card-val" style="color:#22c55e">${Math.floor(ate).toLocaleString()}</div></div>
            <div class="card"><span class="card-label">Pendientes</span><div class="card-val" style="color:#ef4444">${Math.floor(pen).toLocaleString()}</div></div>
        `;

        renderCharts(ate, pen, pas, cas);
    }

    function renderCharts(ate, pen, pas, cas) {
        const isMobile = window.innerWidth <= 768;
        
        const config = (labels, data, colors) => ({
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: colors,
                    borderWidth: 0,
                    hoverOffset: 10
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true, // Crucial para mantener el círculo
                cutout: isMobile ? '65%' : '70%', // Más grueso en móvil para que se vea mejor
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { boxWidth: 12, font: { size: isMobile ? 12 : 11, weight: '600' } }
                    }
                }
            }
        });

        if(chartA) chartA.destroy();
        if(chartF) chartF.destroy();

        chartA = new Chart(document.getElementById('chartAtencion'), config(['Atendidas', 'Pendientes'], [ate, pen], ['#22c55e', '#ef4444']));
        chartF = new Chart(document.getElementById('chartFiscales'), config(['Por Asignar', 'Asignado'], [pas, cas], ['#f97316', '#059669']));
    }
</script>
</body>
</html>
