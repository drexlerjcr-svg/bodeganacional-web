<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Mando Operativa - Monitoreo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/material_blue.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>

    <style>
        :root {
            --primary: #1e3a8a; --accent: #3b82f6; --success: #22c55e; 
            --danger: #ef4444; --warning: #f59e0b; --purple: #8b5cf6;
            --bg: #f1f5f9; --white: #ffffff; --text: #1e293b; --muted: #64748b;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--text); height: 100vh; overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100vw; opacity: 0; transition: opacity 0.5s; position: relative; }
        
        .sidebar { 
            width: 280px; min-width: 280px; background: var(--white); border-right: 1px solid #e2e8f0; 
            display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.05); z-index: 1001;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar.collapsed { margin-left: -280px; }
        .sidebar-header { padding: 20px; background: var(--primary); color: white; font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; gap: 15px; }
        .sidebar-header i { cursor: pointer; color: white !important; }
        .sidebar-content { overflow-y: auto; flex-grow: 1; padding: 10px 0; }

        @media (max-width: 768px) {
            .sidebar { position: absolute; left: 0; height: 100%; width: 85%; max-width: 300px; margin-left: 0; }
            .sidebar.collapsed { margin-left: -100%; }
        }

        .state-item { padding: 12px 20px; margin: 2px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--muted); display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .state-item:hover { background: #f1f5f9; }
        .state-item.active { background: var(--primary); color: white; }
        
        .main-view { flex-grow: 1; padding: 25px; overflow-y: auto; scroll-behavior: smooth; position: relative; }
        
        .floating-toggle { position: fixed; top: 18px; left: 20px; z-index: 999; background: var(--primary); color: white; border: none; width: 42px; height: 42px; border-radius: 8px; cursor: pointer; display: none; align-items: center; justify-content: center; box-shadow: var(--shadow); }

        .banner { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); color: white; padding: 25px; border-radius: 15px; margin-bottom: 30px; box-shadow: var(--shadow); position: relative;}
        .banner h1 { margin: 0; font-size: 1.6rem; text-transform: uppercase; font-weight: 900; }
        
        .calendar-box { margin-top: 15px; display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.15); padding: 8px 15px; border-radius: 8px; width: fit-content; border: 1px solid rgba(255,255,255,0.2); }
        .calendar-box span { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
        .calendar-box input { background: white; border: none; border-radius: 4px; padding: 4px 8px; font-family: inherit; font-weight: 600; color: var(--primary); outline: none; cursor: pointer; width: 100px; }

        @media (max-width: 768px) { .banner { padding-top: 60px; text-align: center; } .floating-toggle { display: flex; } .calendar-box { margin: 15px auto 0 auto; } }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 15px; margin-bottom: 35px; }
        .card { background: var(--white); padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 8px; }
        .card-label { font-size: 0.65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; }
        .card-val { font-size: 1.8rem; font-weight: 800; }

        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 35px; }
        @media (max-width: 768px) { .charts-row { grid-template-columns: 1fr; } }
        
        .chart-container { background: var(--white); padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; box-shadow: var(--shadow); display: flex; flex-direction: column; align-items: center; }
        .chart-container h3 { font-size: 0.75rem; margin-bottom: 15px; color: var(--muted); text-transform: uppercase; }
        .chart-box { position: relative; width: 100%; max-width: 250px; aspect-ratio: 1 / 1; }

        .ranking-card { background: var(--white); padding: 25px; border-radius: 15px; border: 1px solid #e2e8f0; box-shadow: var(--shadow); margin-bottom: 35px; }
        .ranking-item { margin-bottom: 15px; }
        .ranking-header { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 700; margin-bottom: 6px; }
        .bar-container { height: 10px; background: #f1f5f9; border-radius: 5px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 1s ease; }

        .section-title { font-size: 0.8rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin: 35px 0 20px 0; display: flex; align-items: center; gap: 12px; }
        .section-title::before { content: ''; width: 5px; height: 18px; background: var(--warning); border-radius: 3px; }

        #auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 5000; }
        .auth-card { background: white; padding: 50px 40px; border-radius: 20px; text-align: center; width: 90%; max-width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .auth-logo { width: 140px; margin-bottom: 25px; }
        .auth-card h2 { font-size: 1.4rem; color: var(--text); margin-bottom: 25px; font-weight: 700; }
        .pin-input { width: 100%; padding: 18px; font-size: 1.4rem; text-align: center; border: 2px solid #e2e8f0; border-radius: 12px; margin-bottom: 25px; outline: none; transition: border-color 0.2s; box-sizing: border-box; }
        .pin-input:focus { border-color: var(--accent); }
        .auth-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: background 0.2s; }

        /* MODAL Y CHECKLIST */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 20px; backdrop-filter: blur(4px); }
        .modal-card { background: white; width: 100%; max-width: 500px; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        .modal-header { padding: 20px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; }
        
        /* Contenedor Checklist */
        .modal-checklist-container { padding: 15px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; max-height: 180px; overflow-y: auto; }
        .check-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; font-weight: 600; }
        .check-item:hover { background: #edf2f7; }
        .check-item input { width: 18px; height: 18px; cursor: pointer; }

        .modal-body { padding: 20px; max-height: 50vh; overflow-y: auto; }
        .detail-row { padding: 12px; border-bottom: 1px solid #f1f5f9; display: flex; flex-direction: column; gap: 4px; }
        .detail-label { font-size: 0.7rem; font-weight: 800; color: var(--muted); text-transform: uppercase; }
        .detail-val { font-size: 0.9rem; font-weight: 600; color: var(--text); }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <img src="https://i.ibb.co/v4pPWh2s/sundde.png" alt="Logo Sundde" class="auth-logo">
        <h2>PROGRAMACIÓN Y MONITOREO</h2>
        <input type="password" id="pin-input" class="pin-input" placeholder="Contraseña" maxlength="6">
        <button onclick="checkAuth()" class="auth-btn">ACCEDER</button>
    </div>
</div>

<div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3 id="modal-title">Seleccione Registro</h3>
            <i class="fas fa-times" style="cursor:pointer" onclick="closeModal()"></i>
        </div>
        <div id="modal-checklist" class="modal-checklist-container"></div>
        <div id="modal-body" class="modal-body"></div>
    </div>
</div>

<div class="app-container" id="app">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><i class="fas fa-bars" onclick="toggleSidebar()"></i> <span>ESTADOS</span></div>
        <div class="sidebar-content" id="sidebar-list"></div>
    </aside>

    <button class="floating-toggle" id="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

    <main class="main-view" id="main-scroll">
        <div class="banner">
            <h1 id="view-title">VENEZUELA</h1>
            <div id="date-info" style="font-size: 0.85rem; opacity: 0.9; margin-top: 5px; font-weight: 600;">CONECTANDO...</div>
            <div class="calendar-box">
                <span><i class="fas fa-calendar-day"></i> Fecha:</span>
                <input type="text" id="global-date-filter">
            </div>
        </div>

        <div id="dynamic-content">
            <div class="section-title" id="sec-indicadores">Indicadores a destacar</div>
            <div id="grid-criticos" class="grid"></div>

            <div id="full-nacional-content">
                <div class="section-title">Estatus del Flujo de Denuncia</div>
                <div id="grid-estatus" class="grid"></div>
                <div class="section-title">Procesos de Campo e Inspección</div>
                <div id="grid-procesos" class="grid"></div>
                <div class="section-title">Análisis Visual</div>
                <div class="charts-row">
                    <div class="chart-container"><h3>Atención</h3><div class="chart-box"><canvas id="chartAtencion"></canvas></div></div>
                    <div class="chart-container"><h3>Fiscales</h3><div class="chart-box"><canvas id="chartFiscales"></canvas></div></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const webAppUrl = "https://script.google.com/macros/s/AKfycbypsSbSP194UABFRsVsrF0XN8OaeZK7WUj-3triDEUem6gOO2QTqVl8r4-OFGv0bNHm/exec"; 
    let allFetched = [], sedeData = [], chartA, chartF, selectedDateGlobal = "", fp;

    async function checkAuth() {
        const pin = document.getElementById('pin-input').value;
        if(!pin) return;
        try {
            const res = await fetch(`${webAppUrl}?pass=${pin}`);
            const data = await res.json();
            if(data.error) throw new Error();
            allFetched = data.nacional.filter(d => d['ESTADO'] && !['TOTAL','TOTALES'].includes(d['ESTADO'].toUpperCase()));
            sedeData = data.sede;
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('app').style.opacity = '1';
            initApp();
        } catch(e) { alert("PIN Incorrecto"); }
    }

    function initApp() {
        const fechas = [...new Set(allFetched.map(d => d['FECHA']))].filter(f => f);
        fp = flatpickr("#global-date-filter", {
            locale: "es", dateFormat: "d/m/Y",
            defaultDate: fechas[fechas.length-1],
            enable: fechas.map(f => { const [d,m,y] = f.split('/'); return new Date(y,m-1,d); }),
            onChange: (d, str) => { selectedDateGlobal = str; refreshUI(); }
        });
        selectedDateGlobal = fp.input.value;
        renderSidebar();
        refreshUI();
    }

    function renderSidebar() {
        const list = document.getElementById('sidebar-list');
        list.innerHTML = `<div class="state-item active" onclick="setViewState('VENEZUELA', true, this)"><span><i class="fas fa-globe-americas"></i> NACIONAL</span></div>`;
        list.innerHTML += `<div class="state-item" id="btn-sede" onclick="renderSedeCentral(this)"><span><i class="fas fa-building"></i> SEDE CENTRAL</span></div>`;
        [...new Set(allFetched.map(d => d['ESTADO']))].sort().forEach(s => {
            list.innerHTML += `<div class="state-item" onclick="setViewState('${s}', false, this)"><span><i class="fas fa-map-marker-alt"></i> ${s}</span></div>`;
        });
    }

    function setViewState(title, isNacional, el) {
        document.querySelectorAll('.state-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('view-title').innerText = title;
        document.getElementById('full-nacional-content').style.display = "block";
        const data = isNacional ? allFetched : allFetched.filter(d => d['ESTADO'] === title);
        updateDashboard(data);
    }

    function renderSedeCentral(el) {
        document.querySelectorAll('.state-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('view-title').innerText = "SEDE CENTRAL";
        document.getElementById('full-nacional-content').style.display = "none";
        
        const filteredSede = sedeData.filter(r => r['FECHA'] === selectedDateGlobal);

        // LOGICA COLUMNA F (Sujeto de Aplicación)
        const counts = {};
        filteredSede.forEach(r => {
            const s = r['SUJETO DE APLICACIÓN'];
            if(s) counts[s] = (counts[s] || 0) + 1;
        });
        let topSujeto = "N/A", maxVal = 0;
        for(let s in counts) { if(counts[s] > maxVal) { maxVal = counts[s]; topSujeto = s; } }

        const topRows = filteredSede.filter(r => r['SUJETO DE APLICACIÓN'] === topSujeto);
        const topSinAtender = topRows.filter(r => String(r['ESTATUS']).toUpperCase().trim() === "SIN ATENDER").length;

        const count = (est) => filteredSede.filter(r => String(r['ESTATUS']).toUpperCase().trim() === est.toUpperCase()).length;

        document.getElementById('grid-criticos').innerHTML = `
            <div class="card" onclick="showChecklist('CERRADA')" style="cursor:pointer"><span class="card-label">Cerrada</span><div class="card-val" style="color:var(--success)">${count('CERRADA')}</div></div>
            <div class="card" onclick="showChecklist('EN PROCESO')" style="cursor:pointer"><span class="card-label">En Proceso</span><div class="card-val" style="color:var(--accent)">${count('EN PROCESO')}</div></div>
            <div class="card" onclick="showChecklist('SIN ATENDER')" style="cursor:pointer"><span class="card-label">Sin Atender</span><div class="card-val" style="color:var(--danger)">${count('SIN ATENDER')}</div></div>
            <div class="card" style="grid-column: 1/-1; border-left: 5px solid var(--purple);">
                <span class="card-label">Sujeto con mayor incidencia (Columna F)</span>
                <div style="font-size:1.1rem; font-weight:800; color:var(--primary); margin:5px 0;">${topSujeto}</div>
                <div style="display:flex; gap:20px;">
                    <div><span class="card-label">Sin Atender</span><div style="font-size:1.2rem; font-weight:800; color:var(--danger)">${topSinAtender}</div></div>
                    <div><span class="card-label">Total</span><div style="font-size:1.2rem; font-weight:800;">${maxVal}</div></div>
                </div>
            </div>`;
    }

    function showChecklist(estatus) {
        const filtered = sedeData.filter(r => r['FECHA'] === selectedDateGlobal && String(r['ESTATUS']).toUpperCase().trim() === estatus.toUpperCase());
        const checklist = document.getElementById('modal-checklist');
        const body = document.getElementById('modal-body');
        
        checklist.innerHTML = "";
        body.innerHTML = `<p style="text-align:center; color:var(--muted); margin-top:20px;">Seleccione un Código de Denuncia</p>`;
        
        filtered.forEach((r, idx) => {
            const codigo = r['CÓDIGO DE DENUNCIA'] || `Sin Código (${idx})`;
            checklist.innerHTML += `
                <label class="check-item">
                    <input type="radio" name="reg-select" onchange="renderDetail('${estatus}', ${idx})">
                    <span>${codigo}</span>
                </label>`;
        });
        
        document.getElementById('modal-title').innerText = "REGISTROS: " + estatus;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function renderDetail(estatus, idx) {
        const filtered = sedeData.filter(r => r['FECHA'] === selectedDateGlobal && String(r['ESTATUS']).toUpperCase().trim() === estatus.toUpperCase());
        const item = filtered[idx];
        const body = document.getElementById('modal-body');
        
        let html = "";
        for(let key in item) {
            if(key.toUpperCase() !== 'ITEM' && item[key]) {
                html += `<div class="detail-row"><span class="detail-label">${key}</span><span class="detail-val">${item[key]}</span></div>`;
            }
        }
        body.innerHTML = html;
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

    function updateDashboard(data) {
        const current = data.filter(d => d['FECHA'] === selectedDateGlobal);
        const sum = (col) => current.reduce((acc, curr) => acc + parseFloat(String(curr[col] || 0).replace(',','.')), 0);
        document.getElementById('date-info').innerText = "CORTE AL: " + selectedDateGlobal;
        document.getElementById('grid-criticos').innerHTML = `
            <div class="card"><span class="card-label">Recibidos</span><div class="card-val">${sum('REGISTROS RECIBIDOS')}</div></div>
            <div class="card"><span class="card-label">Atendidas</span><div class="card-val" style="color:var(--success)">${sum('ATENDIDAS')}</div></div>
            <div class="card"><span class="card-label">Por Atender</span><div class="card-val" style="color:var(--warning)">${sum('POR ATENDER')}</div></div>`;
        renderCharts(sum('ATENDIDAS'), sum('POR ATENDER'));
    }

    function renderCharts(a, p) {
        if(chartA) chartA.destroy();
        chartA = new Chart(document.getElementById('chartAtencion'), {
            type: 'doughnut',
            data: { labels: ['Atendidas', 'Pendientes'], datasets: [{ data: [a, p], backgroundColor: ['#22c55e', '#ef4444'] }] },
            options: { cutout: '70%', plugins: { legend: { position: 'bottom' } } }
        });
    }

    function refreshUI() {
        const active = document.querySelector('.state-item.active');
        if(active) active.click();
    }
</script>
</body>
</html>
