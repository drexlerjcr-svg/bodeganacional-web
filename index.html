<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de mando - Intendencia de Protección</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #f1f5f9; --card-bg: #ffffff;
            --primary: #1e3a8a; --accent: #3b82f6;
            --success: #22c55e; --danger: #ef4444; --warning: #f59e0b;
            --text-main: #1e293b; --text-muted: #64748b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-body); margin: 0; color: var(--text-main); overflow: hidden; }
        
        /* Layout Principal */
        .app-layout { display: flex; height: 100vh; width: 100vw; position: relative; }

        /* Sidebar Responsive */
        .sidebar { 
            width: 260px; min-width: 260px; background: var(--card-bg); 
            border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; 
            transition: transform 0.3s ease-in-out; z-index: 1000;
        }

        /* Viewport Principal */
        .viewport { flex-grow: 1; padding: 20px; overflow-y: auto; overflow-x: hidden; }
        
        /* Header / Banner */
        .hero-banner { 
            background: var(--primary); color: white; padding: 20px; border-radius: 12px; 
            margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow);
        }
        .hero-banner h1 { margin: 0; font-size: 1.2rem; text-transform: uppercase; }

        /* Botón de Menú Móvil */
        .menu-toggle {
            display: none; position: fixed; bottom: 20px; right: 20px;
            background: var(--primary); color: white; width: 55px; height: 55px;
            border-radius: 50%; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 2000; cursor: pointer; font-size: 1.2rem;
        }

        /* Grids Adaptativos */
        .section-tag { 
            font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; 
            margin: 25px 0 15px 0; display: flex; align-items: center; gap: 10px;
        }
        .section-tag::before { content: ''; width: 4px; height: 16px; background: var(--warning); border-radius: 2px; }

        .grid-cards { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 15px; 
        }

        /* Estilo de Card */
        .card { 
            background: var(--card-bg); padding: 18px; border-radius: 12px; border: 1px solid #e2e8f0;
            box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 8px;
        }
        .card-top { display: flex; justify-content: space-between; align-items: center; }
        .card-label { font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        .card-val { font-size: 1.6rem; font-weight: 800; }
        .progress-box { width: 100%; height: 6px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; transition: width 0.8s ease; }

        /* Overlay para móviles */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }

        /* --- MEDIA QUERIES (EL AJUSTE REAL) --- */
        @media (max-width: 1024px) {
            .grid-cards { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute; left: 0; transform: translateX(-100%);
                height: 100%; box-shadow: 10px 0 15px rgba(0,0,0,0.1);
            }
            .sidebar.active { transform: translateX(0); }
            .menu-toggle { display: block; }
            .overlay.active { display: block; }
            .grid-cards { grid-template-columns: 1fr; } /* Una columna en móvil */
            .hero-banner h1 { font-size: 1rem; }
            .viewport { padding: 15px; }
        }

        .state-btn { padding: 12px; margin: 4px 10px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); display: flex; justify-content: space-between; }
        .state-btn.active { background: var(--primary); color: white; }
        #loader { position: fixed; inset: 0; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 3000; }
    </style>
</head>
<body>

<div id="loader"><i class="fas fa-sync fa-spin fa-3x" style="color: var(--primary)"></i></div>
<button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-map-marked-alt"></i></button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="app-layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header" style="padding: 20px; border-bottom: 1px solid #eee;">Filtro de Ubicación</div>
        <div id="sidebar-list" style="overflow-y: auto; flex-grow: 1; padding-top: 10px;">
            <div class="state-btn active" onclick="resetToNational(this)">
                <span>NACIONAL (TOTAL)</span><i class="fas fa-globe"></i>
            </div>
        </div>
    </aside>

    <main class="viewport">
        <div class="hero-banner">
            <div>
                <h1 id="main-title">CARGANDO...</h1>
                <div style="font-size: 0.75rem; opacity: 0.8;">Sistema de Monitoreo en Tiempo Real</div>
            </div>
            <i class="fas fa-shield-alt fa-2x" style="opacity: 0.3;"></i>
        </div>

        <div class="section-tag">Indicadores Críticos</div>
        <div class="grid-cards" id="grid-principales"></div>

        <div class="section-tag">Estatus y Flujo</div>
        <div class="grid-cards" id="grid-estatus"></div>

        <div class="section-tag">Gestión de Fiscales</div>
        <div class="grid-cards" id="grid-fiscales"></div>

        <div class="section-tag">Rendimiento %</div>
        <div class="grid-cards" id="grid-porcentajes"></div>
        <div style="height: 50px;"></div>
    </main>
</div>

<script>
    const url = "https://docs.google.com/spreadsheets/d/19TiaUO98LcDaVshi2Tb9CJdrmvt08w2nXHrYkrJVLkQ/gviz/tq?tqx=out:json&sheet=Hoja 1";
    let fullData = [];

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function fetchData() {
        try {
            const res = await fetch(url);
            const text = await res.text();
            const json = JSON.parse(text.substring(47).slice(0, -2));
            const cols = json.table.cols.map(c => c.label ? c.label.toUpperCase().trim() : "");
            fullData = json.table.rows.map(r => {
                let row = {};
                r.c.forEach((cell, i) => { if(cols[i]) row[cols[i]] = cell ? (cell.f || cell.v) : 0; });
                return row;
            });
            populateSidebar();
            renderDashboard(fullData);
            document.getElementById('loader').style.display = 'none';
        } catch (e) { console.error(e); }
    }

    function populateSidebar() {
        const list = document.getElementById('sidebar-list');
        const states = [...new Set(fullData.map(d => d['ESTADO']))].filter(Boolean).sort();
        states.forEach(s => {
            const div = document.createElement('div');
            div.className = 'state-btn';
            div.innerHTML = `<span>${s}</span><i class="fas fa-chevron-right" style="font-size:0.5rem"></i>`;
            div.onclick = () => {
                renderDashboard(fullData.filter(d => d['ESTADO'] === s), s);
                document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
                div.classList.add('active');
                if(window.innerWidth <= 768) toggleSidebar();
            };
            list.appendChild(div);
        });
    }

    function createCard(label, value, icon, color, isPercent = false) {
        const valDisplay = isPercent ? (Number(value).toFixed(1)) + '%' : Number(value).toLocaleString();
        return `
            <div class="card">
                <div class="card-top">
                    <span class="card-label">${label}</span>
                    <i class="fas ${icon}" style="color:${color}"></i>
                </div>
                <div class="card-val" style="color:${color}">${valDisplay}</div>
                <div class="progress-box"><div class="progress-bar" style="width:${isPercent ? value : 100}%; background:${color}"></div></div>
            </div>`;
    }

    function renderDashboard(data, title = "VENEZUELA") {
        let s = {};
        const keys = ["REGISTROS RECIBIDOS", "ATENDIDAS", "POR ATENDER", "DENUNCIAS NO ADMITIDAS", "NUEVO", "DENUNCIAS ADMITIDAS", "INSPECCIONADO", "PROCESO CONCILIATORIO", "POR APROBAR FISCALIZACIÓN", "DESESTIMADA", "POR FISCALIZAR", "CERRADO", "POR ASIGNAR FISCAL", "CON FISCAL ASIGNADO", "CON FISCAL NACIONAL", "DIRECTOR DE FISCALIZACIÓN"];
        keys.forEach(k => s[k] = 0);
        data.forEach(d => { keys.forEach(k => { s[k] += Number(d[k]) || 0; }); });

        document.getElementById('main-title').innerText = title;
        document.getElementById('grid-principales').innerHTML = createCard("Recibidos", s["REGISTROS RECIBIDOS"], "fa-folder", "#1e3a8a") + createCard("Atendidas", s["ATENDIDAS"], "fa-check-circle", "#22c55e") + createCard("Pendientes", s["POR ATENDER"], "fa-clock", "#ef4444");
        
        document.getElementById('grid-estatus').innerHTML = 
            createCard("Nuevos", s["NUEVO"], "fa-plus", "#3b82f6") +
            createCard("Admitidas", s["DENUNCIAS ADMITIDAS"], "fa-file-import", "#8b5cf6") +
            createCard("Inspeccionado", s["INSPECCIONADO"], "fa-search", "#0ea5e9") +
            createCard("Cerrado", s["CERRADO"], "fa-archive", "#1e293b");

        document.getElementById('grid-fiscales').innerHTML = 
            createCard("Con Fiscal", s["CON FISCAL ASIGNADO"], "fa-user-tie", "#059669") +
            createCard("Por Asignar", s["POR ASIGNAR FISCAL"], "fa-user-plus", "#d97706");

        const pAte = s["REGISTROS RECIBIDOS"] > 0 ? (s["ATENDIDAS"] / s["REGISTROS RECIBIDOS"]) * 100 : 0;
        document.getElementById('grid-porcentajes').innerHTML = createCard("Eficiencia %", pAte, "fa-percentage", "#22c55e", true);
    }

    function resetToNational(el) {
        renderDashboard(fullData);
        document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        if(window.innerWidth <= 768) toggleSidebar();
    }

    fetchData();
</script>
</body>
</html>
