<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Mando Operativa - Monitoreo en Tiempo Real</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root {
            --primary: #1e3a8a; --accent: #3b82f6; --success: #22c55e; 
            --danger: #ef4444; --warning: #f59e0b; --purple: #8b5cf6;
            --bg: #f1f5f9; --white: #ffffff; --text: #1e293b; --muted: #64748b;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--text); overflow: hidden; }
        .app-container { display: flex; height: 100vh; position: relative; }
        .sidebar { width: 260px; min-width: 260px; background: var(--white); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 1001; }
        .main-view { flex-grow: 1; padding: 20px; overflow-y: auto; position: relative; scroll-behavior: smooth; }
        .banner { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); color: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; box-shadow: var(--shadow); }
        .banner h1 { margin: 0; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 900; }
        .menu-btn { display: none; position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 50%; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 2000; cursor: pointer; font-size: 1.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .chart-container { background: var(--white); padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: var(--shadow); height: 260px; display: flex; flex-direction: column; align-items: center; }
        .chart-container h3 { font-size: 0.65rem; margin: 0 0 10px 0; color: var(--muted); text-transform: uppercase; }
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        canvas { max-width: 100% !important; max-height: 100% !important; }
        .card { background: var(--white); padding: 18px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 8px; }
        .card-head { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-label { font-size: 0.65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; }
        .card-val { font-size: 1.6rem; font-weight: 800; color: var(--text); }
        .progress-bar { width: 100%; height: 6px; background: #eee; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 1s ease-in-out; }
        .section-title { font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin: 25px 0 15px 0; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ''; width: 4px; height: 16px; background: var(--warning); border-radius: 2px; }
        @media (max-width: 768px) { .sidebar { position: absolute; left: 0; transform: translateX(-100%); height: 100%; } .sidebar.open { transform: translateX(0); } .menu-btn { display: block; } .grid { grid-template-columns: 1fr; } .charts-row { grid-template-columns: 1fr; } .chart-container { height: 240px; } }
        .state-item { padding: 12px 15px; margin: 2px 10px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 700; color: var(--muted); }
        .state-item:hover { background: #f8fafc; color: var(--primary); }
        .state-item.active { background: var(--primary); color: white; }
        #loader { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div id="loader">
    <i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--primary)"></i>
    <p style="margin-top: 15px; font-weight: 600; color: var(--muted)">Cargando Datos con URL Corregida...</p>
</div>

<button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div style="padding: 25px 20px; font-weight: 900; color: var(--primary); border-bottom: 1px solid #eee;">
            <i class="fas fa-shield-alt"></i> UBICACIONES
        </div>
        <div id="sidebar-list" style="overflow-y: auto; flex-grow: 1; padding-top: 10px;">
            <div class="state-item active" onclick="resetFilter(this)">NACIONAL (TOTAL)</div>
        </div>
        <div style="padding: 15px; font-size: 10px; color: var(--muted); border-top: 1px solid #eee; text-align: center;">
            SISTEMA DE MANDO v2.6
        </div>
    </aside>

    <main class="main-view" id="main-scroll-container">
        <div class="banner">
            <h1 id="view-title">VENEZUELA</h1>
            <div style="font-size: 0.8rem; opacity: 0.9; margin-top: 4px; font-weight: 500;">
                <i class="far fa-calendar-alt"></i> <span id="current-date"></span> | <span id="date-info">Consolidado Histórico</span>
            </div>
        </div>

        <div class="section-title">Indicadores Críticos</div>
        <div class="grid" id="grid-criticos"></div>

        <div class="section-title">Estatus del Flujo de Denuncia</div>
        <div class="grid" id="grid-estatus"></div>

        <div class="section-title">Asignación de Fiscales y Dependencias</div>
        <div class="grid" id="grid-fiscales"></div>

        <div class="section-title">Análisis Visual de Gestión</div>
        <div class="charts-row">
            <div class="chart-container">
                <h3>Atención vs Pendientes</h3>
                <canvas id="chartAtencion"></canvas>
            </div>
            <div class="chart-container">
                <h3>Asignación de Fiscales</h3>
                <canvas id="chartFiscales"></canvas>
            </div>
        </div>
        <div style="height: 60px;"></div>
    </main>
</div>

<script>
    // URL Corregida (Q mayúscula al final) y ofuscada para mayor protección
    const _0x_u = "aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvMTlUaWFVTzk4TGNEYVZzaGkyVGI5Q0pkcm12dDA4dzJuWEhyWWtySlZMa1EvZ3Zpei90cT90cXg9b3V0Ompzb24mc2hlZXQ9SG9qYSUyMDE=";
    const url = atob(_0x_u);

    let rawData = [];
    let dateColumnName = "";
    let chartA, chartF;

    Chart.register(ChartDataLabels);

    document.getElementById('current-date').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    function scrollToTop() {
        document.getElementById('main-scroll-container').scrollTo({ top: 0, behavior: 'smooth' });
    }

    function toRealDate(val) {
        if (!val) return new Date(0);
        if (typeof val === 'string' && val.includes('Date')) {
            const p = val.match(/\d+/g);
            return new Date(p[0], p[1], p[2]);
        }
        if (typeof val === 'string' && val.includes('/')) {
            const parts = val.split('/');
            return new Date(parts[2], parts[1] - 1, parts[0]);
        }
        const d = new Date(val);
        return isNaN(d.getTime()) ? new Date(0) : d;
    }

    async function init() {
        try {
            const res = await fetch(url);
            const text = await res.text();
            const json = JSON.parse(text.substring(47).slice(0, -2));
            const cols = json.table.cols.map(c => c.label ? c.label.toUpperCase().trim() : "");
            dateColumnName = cols[1];

            rawData = json.table.rows.map(r => {
                let obj = {};
                r.c.forEach((cell, i) => {
                    let val = cell ? (cell.f ? cell.f : cell.v) : 0;
                    if(cols[i]) obj[cols[i]] = val;
                });
                return obj;
            }).filter(d => d['ESTADO'] && d['ESTADO'] !== 'TOTALES');

            renderSidebar();
            updateDashboard(rawData);
            document.getElementById('loader').style.display = 'none';
        } catch (e) {
            console.error(e);
            document.getElementById('loader').innerHTML = "<p style='color:red'>Error de conexión: Verifica que el documento sea público.</p>";
        }
    }

    function renderSidebar() {
        const list = document.getElementById('sidebar-list');
        const states = [...new Set(rawData.map(d => d['ESTADO']))].filter(Boolean).sort();
        states.forEach(s => {
            const div = document.createElement('div');
            div.className = 'state-item';
            div.innerText = s;
            div.onclick = () => {
                const stateRows = rawData.filter(d => d['ESTADO'] === s);
                if (stateRows.length > 0) {
                    let maxTime = 0, newestDateLabel = "";
                    stateRows.forEach(row => {
                        const d = toRealDate(row[dateColumnName]);
                        if (d.getTime() > maxTime) { maxTime = d.getTime(); newestDateLabel = row[dateColumnName]; }
                    });
                    const lastDayData = stateRows.filter(row => toRealDate(row[dateColumnName]).getTime() === maxTime);
                    updateDashboard(lastDayData, s, newestDateLabel);
                }
                document.querySelectorAll('.state-item').forEach(i => i.classList.remove('active'));
                div.classList.add('active');
                if(window.innerWidth <= 768) toggleMenu();
                scrollToTop();
            };
            list.appendChild(div);
        });
    }

    function createCard(label, value, icon, color, isPercent = false) {
        const numericValue = Number(value) || 0;
        const valStr = isPercent ? numericValue.toFixed(1) + '%' : Math.floor(numericValue).toLocaleString('es-ES');
        return `<div class="card">
                <div class="card-head"><span class="card-label">${label}</span><i class="fas ${icon}" style="color:${color}"></i></div>
                <div class="card-val" style="color:${color}">${valStr}</div>
                <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(isPercent ? numericValue : 100, 100)}%; background:${color}"></div></div>
            </div>`;
    }

    function initCharts(atendidas, porAtender, porAsignar, conFiscal) {
        const config = (labels, data, colors) => ({
            type: 'doughnut',
            data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 2, borderColor: '#ffffff' }] },
            options: {
                responsive: true, maintainAspectRatio: false, cutout: '65%',
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 }, padding: 10 } },
                    datalabels: { color: '#fff', font: { weight: 'bold', size: 11 }, formatter: (v) => v > 0 ? v.toLocaleString('es-ES') : '' }
                }
            }
        });
        if (chartA) chartA.destroy();
        if (chartF) chartF.destroy();
        chartA = new Chart(document.getElementById('chartAtencion'), config(['Atendidas', 'Por Atender'], [atendidas, porAtender], ['#22c55e', '#ef4444']));
        chartF = new Chart(document.getElementById('chartFiscales'), config(['Por Asignar Fiscal', 'Con Fiscal Asignado'], [porAsignar, conFiscal], ['#f97316', '#059669']));
    }

    function updateDashboard(data, title = "VENEZUELA", dateLabel = null) {
        let s = {};
        const columnsToSum = ["REGISTROS RECIBIDOS", "ATENDIDAS", "POR ATENDER", "DENUNCIAS ADMITIDAS", "DENUNCIAS NO ADMITIDAS", "NUEVO", "INSPECCIONADO", "PROCESO CONCILIATORIO", "CENTRALIZADA", "POR APROBAR FISCALIZACIÓN", "DESESTIMADA", "POR FISCALIZAR", "PROCESO CULMINADO", "CERRADO", "POR ASIGNAR FISCAL", "DIRECTOR DE FISCALIZACIÓN", "CON FISCAL ASIGNADO", "CON FISCAL NACIONAL", "OTRA DEPENDENCI"];
        columnsToSum.forEach(c => s[c] = 0);
        data.forEach(d => columnsToSum.forEach(c => s[c] += Number(d[c]) || 0));

        document.getElementById('view-title').innerText = title;
        document.getElementById('date-info').innerText = dateLabel ? `Reporte del: ${dateLabel}` : "Consolidado Histórico";

        initCharts(s["ATENDIDAS"], s["POR ATENDER"], s["POR ASIGNAR FISCAL"], s["CON FISCAL ASIGNADO"]);

        document.getElementById('grid-criticos').innerHTML = 
            createCard("Registros Recibidos", s["REGISTROS RECIBIDOS"], "fa-inbox", "var(--primary)") +
            createCard("Atendidas", s["ATENDIDAS"], "fa-check-circle", "var(--success)") +
            createCard("Por Atender", s["POR ATENDER"], "fa-hourglass-half", "var(--danger)");

        document.getElementById('grid-estatus').innerHTML = 
            createCard("Nuevas", s["NUEVO"], "fa-certificate", "#3b82f6") +
            createCard("Admitidas", s["DENUNCIAS ADMITIDAS"], "fa-file-alt", "#8b5cf6") +
            createCard("No Admitidas", s["DENUNCIAS NO ADMITIDAS"], "fa-ban", "#94a3b8") +
            createCard("Culminadas", s["PROCESO CULMINADO"], "fa-flag-checkered", "#22c55e") +
            createCard("Cerrado", s["CERRADO"], "fa-archive", "#1e293b");

        document.getElementById('grid-fiscales').innerHTML = 
            createCard("Por Asignar", s["POR ASIGNAR FISCAL"], "fa-user-plus", "#f97316") +
            createCard("Fiscal Asignado", s["CON FISCAL ASIGNADO"], "fa-user-tie", "#059669") +
            createCard("Fiscal Nacional", s["CON FISCAL NACIONAL"], "fa-landmark", "#4338ca") +
            createCard("Dir. Fiscalización", s["DIRECTOR DE FISCALIZACIÓN"], "fa-user-shield", "#be185d");
    }

    function resetFilter(el) {
        updateDashboard(rawData);
        document.querySelectorAll('.state-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        if(window.innerWidth <= 768) toggleMenu();
        scrollToTop();
    }

    init();
</script>
</body>
</html>
