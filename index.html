<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>
<body class="p-8 bg-slate-50">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-2xl font-black text-indigo-900 mb-6 uppercase tracking-widest">Control de Denuncias Totales</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-indigo-500">
                <p class="text-sm font-bold text-gray-400">RECIBIDAS (TOTAL REAL)</p>
                <h2 id="kpi-recibidas" class="text-4xl font-black text-gray-800 tracking-tighter">Cargando...</h2>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-emerald-500">
                <p class="text-sm font-bold text-gray-400">ATENDIDAS</p>
                <h2 id="kpi-atendidas" class="text-4xl font-black text-emerald-600 tracking-tighter">0</h2>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-orange-500">
                <p class="text-sm font-bold text-gray-400">POR ATENDER</p>
                <h2 id="kpi-pendientes" class="text-4xl font-black text-orange-600 tracking-tighter">0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-xl shadow-sm">
                <h3 class="font-bold mb-4 text-gray-600 uppercase text-sm">Distribución por Estado</h3>
                <div id="chart-bar"></div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm">
                <h3 class="font-bold mb-4 text-gray-600 uppercase text-sm">Proporción de Atención</h3>
                <div id="chart-donut"></div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/19TiaUO98LcDaVshi2Tb9CJdrmvt08w2nXHrYkrJVLkQ/gviz/tq?tqx=out:json&sheet=Hoja%201';

        async function loadData() {
            const res = await fetch(SHEET_URL);
            const text = await res.text();
            const json = JSON.parse(text.substring(47, text.length - 2));
            const rows = json.table.rows;

            let totalR = 0, totalA = 0, totalP = 0;
            const estados = [], valoresR = [];

            rows.forEach((row, index) => {
                const c = row.c;
                
                // Función auxiliar para limpiar números (evita el error de los 408)
                const parseVal = (valObj) => {
                    if (!valObj || valObj.v === null) return 0;
                    let v = valObj.v;
                    // Si el valor viene como string con comas o puntos, lo limpiamos
                    if (typeof v === 'string') v = parseFloat(v.replace(/[^0-9.]/g, ''));
                    return isNaN(v) ? 0 : v;
                };

                // IMPORTANTE: Saltamos la fila 0 (cabecera) y la fila de "TOTALES" (si existe) 
                // para no duplicar la suma. Sumamos fila por fila de cada ESTADO.
                const nombreEstado = c[0] ? c[0].v : "";
                
                if (nombreEstado && nombreEstado !== "ESTADO" && nombreEstado !== "TOTALES" && nombreEstado !== "TOTAL") {
                    const r = parseVal(c[4]); // Recibidas
                    const a = parseVal(c[12]); // Atendidas
                    const p = parseVal(c[13]); // Por Atender

                    totalR += r;
                    totalA += a;
                    totalP += p;

                    estados.push(nombreEstado);
                    valoresR.push(r);
                }
            });

            // Si por alguna razón la suma de filas no da (por datos ocultos), 
            // este script garantiza que estamos leyendo CADA celda de la columna 4.
            
            document.getElementById('kpi-recibidas').innerText = totalR.toLocaleString();
            document.getElementById('kpi-atendidas').innerText = totalA.toLocaleString();
            document.getElementById('kpi-pendientes').innerText = totalP.toLocaleString();

            // Gráfico de Barras
            new ApexCharts(document.querySelector("#chart-bar"), {
                series: [{ name: 'Recibidas', data: valoresR }],
                chart: { type: 'bar', height: 400 },
                xaxis: { categories: estados },
                colors: ['#6366f1']
            }).render();

            // Gráfico Donut
            new ApexCharts(document.querySelector("#chart-donut"), {
                series: [totalA, totalP],
                chart: { type: 'donut', height: 400 },
                labels: ['Atendidas', 'Por Atender'],
                colors: ['#10b981', '#f59e0b']
            }).render();
        }

        loadData();
    </script>
</body>
</html>
