<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Mando Operativa - Monitoreo en Tiempo Real</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root {
            --primary: #1e3a8a; --accent: #3b82f6; --success: #22c55e; 
            --danger: #ef4444; --warning: #f59e0b; --purple: #8b5cf6;
            --bg: #f1f5f9; --white: #ffffff; --text: #1e293b; --muted: #64748b;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        /* --- PANEL DE CONTRASEÑA --- */
        #auth-overlay {
            position: fixed; inset: 0; background: var(--primary);
            display: flex; justify-content: center; align-items: center;
            z-index: 5000; transition: opacity 0.5s ease;
        }
        .auth-card {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
            text-align: center; width: 90%; max-width: 400px;
        }
        .auth-card i { color: var(--primary); margin-bottom: 20px; }
        .auth-card h2 { margin: 0 0 10px; color: var(--text); font-weight: 900; text-transform: uppercase; }
        .auth-card p { color: var(--muted); font-size: 0.9rem; margin-bottom: 25px; }
        .pin-input {
            width: 100%; padding: 15px; font-size: 1.5rem; text-align: center;
            letter-spacing: 10px; border: 2px solid #e2e8f0; border-radius: 10px;
            margin-bottom: 20px; outline: none; transition: border-color 0.3s;
        }
        .pin-input:focus { border-color: var(--accent); }
        .btn-auth {
            width: 100%; padding: 15px; background: var(--primary);
            color: white; border: none; border-radius: 10px;
            font-weight: bold; cursor: pointer; font-size: 1rem;
        }
        .btn-auth:hover { background: #152a66; }
        .error-msg { color: var(--danger); font-size: 0.8rem; margin-top: 10px; display: none; }

        /* --- ESTILOS ORIGINALES --- */
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--text); overflow: hidden; }
        .app-container { display: flex; height: 100vh; position: relative; opacity: 0; transition: opacity 0.5s; }
        .sidebar { width: 260px; min-width: 260px; background: var(--white); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 1001; }
        .main-view { flex-grow: 1; padding: 20px; overflow-y: auto; position: relative; scroll-behavior: smooth; }
        .banner { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); color: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; box-shadow: var(--shadow); }
        .banner h1 { margin: 0; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 900; }
        .menu-btn { display: none; position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 50%; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 2000; cursor: pointer; font-size: 1.5rem; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: var(--white); padding: 18px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 8px; }
        .card-label { font-size: 0.65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; }
        .card-val { font-size: 1.6rem; font-weight: 800; color: var(--text); }
        
        .section-title { font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin: 25px 0 15px 0; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ''; width: 4px; height: 16px; background: var(--warning); border-radius: 2px; }

        /* --- NUEVOS ESTILOS TIPO RANKING (IMAGEN) --- */
        .ranking-container { background: var(--white); border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; box-shadow: var(--shadow); }
        .ranking-item { margin-bottom: 15px; }
        .ranking-info { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.75rem; font-weight: 700; color: var(--text); }
        .ranking-bar-bg { width: 100%; height: 12px; background: #e2e8f0; border-radius: 6px; overflow: hidden; position: relative; }
        .ranking-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 1.5s ease-in-out; }
        .ranking-perc { color: var(--primary); font-weight: 900; }

        @media (max-width: 768px) { .sidebar { position: absolute; left: 0; transform: translateX(-100%); height: 100%; } .sidebar.open { transform: translateX(0); } .menu-btn { display: block; } .grid { grid-template-columns: 1fr; } }
        .state-item { padding: 12px 15px; margin: 2px 10px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 700; color: var(--muted); }
        .state-item:hover { background: #f8fafc; color: var(--primary); }
        .state-item.active { background: var(--primary); color: white; }
        #loader { position: fixed; inset: 0; background: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <i class="fas fa-user-shield fa-4x"></i>
        <h2>SALA DE MANDO</h2>
        <p>Ingrese el código de seguridad</p>
        <input type="password" id="pin-input" class="pin-input" placeholder="****" maxlength="4">
        <button class="btn-auth" onclick="checkAuth()">ENTRAR</button>
        <div id="error-msg" class="error-msg">Código incorrecto.</div>
    </div>
</div>

<div id="loader">
    <i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--primary)"></i>
    <p style="margin-top: 15px; font-weight: 600; color: var(--muted)">Cargando Datos...</p>
</div>

<button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="app-container" id="app">
    <aside class="sidebar" id="sidebar">
        <div style="padding: 25px 20px; font-weight: 900; color: var(--primary); border-bottom: 1px solid #eee;">
            <i class="fas fa-shield-alt"></i> UBICACIONES
        </div>
        <div id="sidebar-list" style="overflow-y: auto; flex-grow: 1; padding-top: 10px;">
            <div class="state-item active" onclick="resetFilter(this)">NACIONAL (TOTAL)</div>
        </div>
        <div style="padding: 15px; font-size: 10px; color: var(--muted); border-top: 1px solid #eee; text-align: center;">
            SISTEMA DE MANDO v2.6
        </div>
    </aside>

    <main class="main-view" id="main-scroll-container">
        <div class="banner">
            <h1 id="view-title">VENEZUELA</h1>
            <div style="font-size: 0.8rem; opacity: 0.9; margin-top: 4px; font-weight: 500;">
                <i class="far fa-calendar-alt"></i> <span id="current-date"></span> | <span id="date-info">Consolidado Histórico</span>
            </div>
        </div>

        <div class="section-title">Indicadores Críticos</div>
        <div class="grid" id="grid-criticos"></div>

        <div class="section-title">Desempeño de Atención por Estados</div>
        <div class="ranking-container" id="ranking-estados">
            </div>

        <div class="section-title">Estatus del Flujo de Denuncia</div>
        <div class="grid" id="grid-estatus"></div>
        
        <div class="section-title">Asignación de Fiscales</div>
        <div class="grid" id="grid-fiscales"></div>
        
        <div style="height: 60px;"></div>
    </main>
</div>

<script>
    const _0x_h = "MTc5Mw==";
    const _0x_u = "aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvMTlUaWFVTzk4TGNEYVZzaGkyVGI5Q0pkcm12dDA4dzJuWEhyWWtySlZMa1EvZ3Zpei90cT90cXg9b3V0Ompzb24mc2hlZXQ9SG9qYSUyMDE=";
    const url = atob(_0x_u);

    let rawData = [];
    let dateColumnName = "";

    function checkAuth() {
        const input = document.getElementById('pin-input').value;
        if (btoa(input) === _0x_h) {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('app').style.opacity = '1';
            document.getElementById('loader').style.display = 'flex';
            init(); 
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    async function init() {
        try {
            const res = await fetch(url);
            const text = await res.text();
            const json = JSON.parse(text.substring(47).slice(0, -2));
            const cols = json.table.cols.map(c => c.label ? c.label.toUpperCase().trim() : "");
            dateColumnName = cols[1];

            rawData = json.table.rows.map(r => {
                let obj = {};
                r.c.forEach((cell, i) => {
                    let val = cell ? (cell.f ? cell.f : cell.v) : 0;
                    if(cols[i]) obj[cols[i]] = val;
                });
                return obj;
            }).filter(d => d['ESTADO'] && d['ESTADO'] !== 'TOTALES');

            renderSidebar();
            updateDashboard(rawData);
            document.getElementById('loader').style.display = 'none';
        } catch (e) {
            document.getElementById('loader').innerHTML = "<p>Error de carga.</p>";
        }
    }

    function updateDashboard(data, title = "VENEZUELA", dateLabel = null) {
        let s = {};
        const colsToSum = ["REGISTROS RECIBIDOS", "ATENDIDAS", "POR ATENDER", "DENUNCIAS ADMITIDAS", "DENUNCIAS NO ADMITIDAS", "NUEVO", "PROCESO CULMINADO", "CERRADO", "POR ASIGNAR FISCAL", "CON FISCAL ASIGNADO", "CON FISCAL NACIONAL", "DIRECTOR DE FISCALIZACIÓN"];
        colsToSum.forEach(c => s[c] = 0);
        data.forEach(d => colsToSum.forEach(c => s[c] += Number(d[c]) || 0));

        document.getElementById('view-title').innerText = title;
        document.getElementById('date-info').innerText = dateLabel ? `Reporte del: ${dateLabel}` : "Consolidado Histórico";

        // Tarjetas superiores
        document.getElementById('grid-criticos').innerHTML = 
            createCard("Recibidos", s["REGISTROS RECIBIDOS"], "fa-inbox", "var(--primary)") +
            createCard("Atendidas", s["ATENDIDAS"], "fa-check-circle", "var(--success)") +
            createCard("Pendientes", s["POR ATENDER"], "fa-hourglass-half", "var(--danger)");

        document.getElementById('grid-estatus').innerHTML = 
            createCard("Nuevas", s["NUEVO"], "fa-certificate", "#3b82f6") +
            createCard("Culminadas", s["PROCESO CULMINADO"], "fa-flag-checkered", "#22c55e") +
            createCard("Cerrado", s["CERRADO"], "fa-archive", "#1e293b");

        document.getElementById('grid-fiscales').innerHTML = 
            createCard("Por Asignar", s["POR ASIGNAR FISCAL"], "fa-user-plus", "#f97316") +
            createCard("Fiscal Asignado", s["CON FISCAL ASIGNADO"], "fa-user-tie", "#059669");

        // Generar el gráfico de barras tipo ranking
        renderRanking(data);
    }

    function renderRanking(data) {
        const container = document.getElementById('ranking-estados');
        container.innerHTML = "";

        // Agrupar por estado para obtener el rendimiento
        const states = [...new Set(rawData.map(d => d['ESTADO']))];
        const rankingData = states.map(state => {
            const stateRows = rawData.filter(d => d['ESTADO'] === state);
            let rec = 0, ate = 0;
            stateRows.forEach(r => {
                rec += Number(r["REGISTROS RECIBIDOS"]) || 0;
                ate += Number(r["ATENDIDAS"]) || 0;
            });
            const perc = rec > 0 ? (ate / rec * 100) : 0;
            return { state, perc, ate, rec };
        }).sort((a, b) => b.perc - a.perc).slice(0, 10); // Top 10 según la imagen

        rankingData.forEach(item => {
            const html = `
                <div class="ranking-item">
                    <div class="ranking-info">
                        <span>${item.state}</span>
                        <span class="ranking-perc">${item.perc.toFixed(1)}% (${item.ate}/${item.rec})</span>
                    </div>
                    <div class="ranking-bar-bg">
                        <div class="ranking-bar-fill" style="width: ${item.perc}%"></div>
                    </div>
                </div>`;
            container.innerHTML += html;
        });
    }

    function createCard(label, value, icon, color) {
        return `<div class="card">
                    <div style="display:flex; justify-content:space-between">
                        <span class="card-label">${label}</span>
                        <i class="fas ${icon}" style="color:${color}"></i>
                    </div>
                    <div class="card-val" style="color:${color}">${Math.floor(value).toLocaleString('es-ES')}</div>
                </div>`;
    }

    function renderSidebar() {
        const list = document.getElementById('sidebar-list');
        const states = [...new Set(rawData.map(d => d['ESTADO']))].filter(Boolean).sort();
        states.forEach(s => {
            const div = document.createElement('div');
            div.className = 'state-item';
            div.innerText = s;
            div.onclick = () => {
                const stateRows = rawData.filter(d => d['ESTADO'] === s);
                updateDashboard(stateRows, s);
                document.querySelectorAll('.state-item').forEach(i => i.classList.remove('active'));
                div.classList.add('active');
                if(window.innerWidth <= 768) toggleMenu();
            };
            list.appendChild(div);
        });
    }

    function resetFilter(el) {
        updateDashboard(rawData);
        document.querySelectorAll('.state-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        if(window.innerWidth <= 768) toggleMenu();
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); }
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
</script>
</body>
</html>
