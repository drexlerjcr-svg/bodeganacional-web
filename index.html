<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.M.O. - Acceso Seguro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3a8a; --accent: #3b82f6; --success: #22c55e; 
            --danger: #ef4444; --warning: #f59e0b; --bg: #f1f5f9; --white: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; overflow: hidden; }
        
        /* Pantalla de Bloqueo */
        #lock-screen {
            position: fixed; inset: 0; background: var(--primary);
            display: flex; justify-content: center; align-items: center; z-index: 5000;
        }
        .lock-box {
            background: white; padding: 40px; border-radius: 20px; text-align: center;
            box-shadow: 0 20px 25px rgba(0,0,0,0.2); width: 320px;
        }
        .lock-box i { font-size: 3rem; color: var(--primary); margin-bottom: 15px; }
        .lock-box input {
            width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #e2e8f0;
            border-radius: 10px; text-align: center; font-size: 1.1rem; box-sizing: border-box;
        }
        .lock-box button {
            background: var(--primary); color: white; border: none; padding: 12px;
            width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        /* App container oculto */
        .app-container { display: none; height: 100vh; }
        .sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .main-view { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .banner { background: var(--primary); color: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: white; padding: 18px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card-label { font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; }
        .card-val { font-size: 1.5rem; font-weight: 800; margin-top: 5px; }

        .state-item { padding: 12px 15px; margin: 2px 10px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 700; color: #64748b; }
        .state-item.active { background: var(--primary); color: white; }
        #loader { position: fixed; inset: 0; background: white; display: none; justify-content: center; align-items: center; z-index: 4000; flex-direction: column; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-box">
        <i class="fas fa-lock"></i>
        <h2>Sala de Mando</h2>
        <input type="password" id="passInput" placeholder="Contraseña">
        <button onclick="verifyKey()">ENTRAR</button>
        <p id="error-msg" style="color:red; display:none; margin-top:10px; font-size:0.8rem">Clave incorrecta</p>
    </div>
</div>

<div id="loader">
    <i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--primary)"></i>
    <p style="margin-top:15px; font-weight:bold">Cargando datos...</p>
</div>

<div class="app-container" id="app">
    <aside class="sidebar">
        <div style="padding: 20px; font-weight: 800; color: var(--primary); border-bottom: 1px solid #eee;">UBICACIONES</div>
        <div id="sidebar-list" style="overflow-y: auto; flex-grow: 1; padding-top: 10px;">
            <div class="state-item active" onclick="resetFilter(this)">NACIONAL (TOTAL)</div>
        </div>
    </aside>

    <main class="main-view">
        <div class="banner">
            <h1 id="view-title">VENEZUELA</h1>
            <p style="margin:5px 0 0 0; opacity:0.8; font-size:0.75rem">Sala de Programación y Monitoreo</p>
        </div>

        <div style="font-weight:800; color:var(--primary); margin: 20px 0 10px 0; font-size:0.75rem">INDICADORES CRÍTICOS</div>
        <div class="grid" id="grid-criticos"></div>

        <div style="font-weight:800; color:var(--primary); margin: 20px 0 10px 0; font-size:0.75rem">FLUJO DE DENUNCIA</div>
        <div class="grid" id="grid-estatus"></div>

        <div style="font-weight:800; color:var(--primary); margin: 20px 0 10px 0; font-size:0.75rem">FISCALIZACIÓN</div>
        <div class="grid" id="grid-fiscales"></div>
    </main>
</div>

<script>
    // URL Ofuscada (Base64)
    const _sh = "aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvMTlUaWFVTzk4TGNEYVZzaGkyVGI5Q0pkcm12dDA4dzJuWEhyWWtySlZMazAvZ3Zpei90cT90cXg9b3V0Ompzb24mc2hlZXQ9SG9qYSUyMDE=";
    
    // Contraseña: '1234' en Base64 es 'MTIzNA=='
    const _kh = "MTIzNA=="; 

    function verifyKey() {
        const input = document.getElementById('passInput').value;
        if (btoa(input) === _kh) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('loader').style.display = 'flex';
            init();
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    document.getElementById('passInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') verifyKey();
    });

    let rawData = [];

    async function init() {
        try {
            const res = await fetch(atob(_sh));
            const text = await res.text();
            const json = JSON.parse(text.substring(47).slice(0, -2));
            const cols = json.table.cols.map(c => c.label ? c.label.toUpperCase().trim() : "");
            
            rawData = json.table.rows.map(r => {
                let obj = {};
                r.c.forEach((cell, i) => { if(cols[i]) obj[cols[i]] = cell ? (cell.f || cell.v) : 0; });
                return obj;
            });

            renderSidebar();
            updateDashboard(rawData);
            document.getElementById('loader').style.display = 'none';
        } catch (e) { 
            console.error(e);
            alert("Error al conectar con Google Sheets.");
        }
    }

    function renderSidebar() {
        const list = document.getElementById('sidebar-list');
        const states = [...new Set(rawData.map(d => d['ESTADO']))].filter(Boolean).sort();
        states.forEach(s => {
            const div = document.createElement('div');
            div.className = 'state-item';
            div.innerText = s;
            div.onclick = () => {
                updateDashboard(rawData.filter(d => d['ESTADO'] === s), s);
                document.querySelectorAll('.state-item').forEach(i => i.classList.remove('active'));
                div.classList.add('active');
            };
            list.appendChild(div);
        });
    }

    function createCard(label, value, color) {
        return `
            <div class="card">
                <div class="card-label">${label}</div>
                <div class="card-val" style="color:${color}">${Number(value).toLocaleString()}</div>
            </div>`;
    }

    function updateDashboard(data, title = "VENEZUELA") {
        let s = {};
        const columns = [
            "REGISTROS RECIBIDOS", "ATENDIDAS", "POR ATENDER", "DENUNCIAS ADMITIDAS", 
            "DENUNCIAS NO ADMITIDAS", "INSPECCIONADO", "PROCESO CONCILIATORIO", 
            "POR FISCALIZAR", "CERRADO", "CON FISCAL ASIGNADO", "CON FISCAL NACIONAL"
        ];
        
        columns.forEach(c => s[c] = 0);
        data.forEach(d => columns.forEach(c => s[c] += Number(d[c]) || 0));

        document.getElementById('view-title').innerText = title;

        document.getElementById('grid-criticos').innerHTML = 
            createCard("Recibidos", s["REGISTROS RECIBIDOS"], "var(--primary)") +
            createCard("Atendidas", s["ATENDIDAS"], "var(--success)") +
            createCard("Por Atender", s["POR ATENDER"], "var(--danger)");

        document.getElementById('grid-estatus').innerHTML = 
            createCard("Admitidas", s["DENUNCIAS ADMITIDAS"], "#8b5cf6") +
            createCard("No Admitidas", s["DENUNCIAS NO ADMITIDAS"], "#64748b") +
            createCard("Inspeccionado", s["INSPECCIONADO"], "#0ea5e9") +
            createCard("Cerrado", s["CERRADO"], "#1e293b");

        document.getElementById('grid-fiscales').innerHTML = 
            createCard("Por Fiscalizar", s["POR FISCALIZAR"], "var(--warning)") +
            createCard("Fiscal Asignado", s["CON FISCAL ASIGNADO"], "var(--accent)") +
            createCard("Fiscal Nacional", s["CON FISCAL NACIONAL"], "var(--primary)");
    }

    function resetFilter(el) {
        updateDashboard(rawData);
        document.querySelectorAll('.state-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }
</script>
</body>
</html>
