<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Real-Time | Gestión de Reclamaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .card { background: white; border-radius: 12px; padding: 1.5rem; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .purple-gradient { background: linear-gradient(135deg, #4c1d95 0%, #7c3aed 100%); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-800 italic uppercase">Dashboard de Control Operativo</h1>
            <p class="text-sm text-gray-500">Fuente: Google Sheets (Hoja 1)</p>
        </div>
        <div id="last-update" class="text-xs text-gray-400 font-mono"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <div class="card border-t-4 border-indigo-600">
            <p class="text-xs font-bold text-gray-400 uppercase">Recibidas</p>
            <h2 id="kpi-recibidas" class="text-3xl font-black text-gray-800">0</h2>
        </div>
        <div class="card border-t-4 border-emerald-500">
            <p class="text-xs font-bold text-gray-400 uppercase">Atendidas</p>
            <h2 id="kpi-atendidas" class="text-3xl font-black text-emerald-600">0</h2>
        </div>
        <div class="card border-t-4 border-orange-500">
            <p class="text-xs font-bold text-gray-400 uppercase">Por Atender</p>
            <h2 id="kpi-pendientes" class="text-3xl font-black text-orange-600">0</h2>
        </div>
        <div class="card border-t-4 border-purple-600">
            <p class="text-xs font-bold text-gray-400 uppercase">% Eficiencia</p>
            <h2 id="kpi-eficiencia" class="text-3xl font-black text-purple-600">0%</h2>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-4 card">
            <h3 class="text-sm font-bold text-gray-700 mb-6 uppercase border-b pb-2">Estado de Atención</h3>
            <div id="chart-pie"></div>
        </div>

        <div class="lg:col-span-8 card">
            <h3 class="text-sm font-bold text-gray-700 mb-6 uppercase border-b pb-2">Distribución por Estado (Top 15)</h3>
            <div id="chart-bar"></div>
        </div>

        <div class="lg:col-span-12 card">
            <h3 class="text-sm font-bold text-gray-700 mb-6 uppercase border-b pb-2">Seguimiento de Etapas</h3>
            <div id="chart-area"></div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/19TiaUO98LcDaVshi2Tb9CJdrmvt08w2nXHrYkrJVLkQ/gviz/tq?tqx=out:json&sheet=Hoja%201';

        async function fetchData() {
            const response = await fetch(SHEET_URL);
            const text = await response.text();
            // Limpiar el formato JSON de Google que viene con basura al inicio
            const json = JSON.parse(text.substr(47).slice(0, -2));
            processData(json.table);
        }

        function processData(table) {
            const rows = table.rows;
            
            // Asumiendo el orden de columnas en tu Hoja 1:
            // Col 0: Estado, Col 4: Recibidas, Col 12: Atendidas, Col 13: Por Atender...
            // Ajustado según la estructura estándar de tu sheet "BaseDeDatos"
            
            let totalRecibidas = 0;
            let totalAtendidas = 0;
            let totalPendientes = 0;
            let etapaInsp = 0, etapaConc = 0, etapaFisc = 0;

            const labels = [];
            const valuesRecibidas = [];

            rows.forEach(row => {
                const r = row.c;
                if(r[0] && r[0].v !== "ESTADO") { // Evitar cabeceras
                    labels.push(r[0].v);
                    const recib = r[4] ? r[4].v : 0;
                    const atend = r[12] ? r[12].v : 0;
                    const pend = r[13] ? r[13].v : 0;
                    
                    totalRecibidas += recib;
                    totalAtendidas += atend;
                    totalPendientes += pend;
                    
                    // Etapas (basado en posiciones probables de tu sheet)
                    etapaInsp += r[9] ? r[9].v : 0;
                    etapaConc += r[10] ? r[10].v : 0;
                    etapaFisc += r[11] ? r[11].v : 0;

                    valuesRecibidas.push(recib);
                }
            });

            // Actualizar KPIs
            document.getElementById('kpi-recibidas').innerText = totalRecibidas.toLocaleString();
            document.getElementById('kpi-atendidas').innerText = totalAtendidas.toLocaleString();
            document.getElementById('kpi-pendientes').innerText = totalPendientes.toLocaleString();
            document.getElementById('kpi-eficiencia').innerText = ((totalAtendidas/totalRecibidas)*100).toFixed(1) + "%";
            document.getElementById('last-update').innerText = "Última sincronización: " + new Date().toLocaleTimeString();

            // Gráfico Circular
            new ApexCharts(document.querySelector("#chart-pie"), {
                series: [totalAtendidas, totalPendientes],
                chart: { type: 'donut', height: 350 },
                labels: ['Atendidas', 'Por Atender'],
                colors: ['#10b981', '#f97316'],
                plotOptions: { pie: { donut: { size: '70%' } } },
                legend: { position: 'bottom' }
            }).render();

            // Gráfico de Barras
            new ApexCharts(document.querySelector("#chart-bar"), {
                series: [{ name: 'Denuncias', data: valuesRecibidas.slice(0,15) }],
                chart: { type: 'bar', height: 350, toolbar: {show: false} },
                xaxis: { categories: labels.slice(0,15) },
                colors: ['#6366f1'],
                plotOptions: { bar: { borderRadius: 4, horizontal: false } }
            }).render();

            // Gráfico de Etapas (Área)
            new ApexCharts(document.querySelector("#chart-area"), {
                series: [{ name: 'Casos', data: [etapaInsp, etapaConc, etapaFisc] }],
                chart: { type: 'area', height: 200, toolbar: {show: false} },
                xaxis: { categories: ['Inspección', 'Conciliación', 'Fiscalización'] },
                colors: ['#8b5cf6'],
                fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.7, opacityTo: 0.3 } }
            }).render();
        }

        fetchData();
    </script>
</body>
</html>
