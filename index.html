<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Mando - Programación y Monitoreo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3a8a; --accent: #3b82f6; --success: #22c55e; 
            --danger: #ef4444; --warning: #f59e0b; --bg: #f1f5f9; --white: #ffffff;
            --text: #1e293b; --muted: #64748b;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; overflow: hidden; color: var(--text); }
        
        /* Pantalla de Login */
        #lock-screen {
            position: fixed; inset: 0; background: var(--primary);
            display: flex; justify-content: center; align-items: center; z-index: 5000;
        }
        .lock-box { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .lock-box input { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #e2e8f0; border-radius: 10px; text-align: center; font-size: 1.1rem; box-sizing: border-box; }
        .lock-box button { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Estructura App */
        .app-container { display: none; height: 100vh; }
        .sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .main-view { flex-grow: 1; padding: 25px; overflow-y: auto; }
        
        .banner { background: var(--primary); color: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .section-title { font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin: 25px 0 15px 0; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ''; width: 4px; height: 16px; background: var(--warning); border-radius: 2px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
        .card { background: white; padding: 18px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card-label { font-size: 0.65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; }
        .card-val { font-size: 1.6rem; font-weight: 800; margin-top: 5px; }

        .state-item { padding: 12px 15px; margin: 2px 10px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 700; color: var(--muted); }
        .state-item.active { background: var(--primary); color: white; }
        #loader { position: fixed; inset: 0; background: white; display: none; justify-content: center; align-items: center; z-index: 4000; flex-direction: column; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-box">
        <i class="fas fa-shield-alt fa-3x" style="color:var(--primary)"></i>
        <h2 style="margin-top:15px">Sala de Monitoreo - Intendencia de Protección</h2>
        <input type="password" id="passInput" placeholder="Contraseña">
        <button onclick="verifyKey()">INGRESAR</button>
        <p id="error-msg" style="color:red; display:none; margin-top:10px; font-size:0.8rem">Clave incorrecta</p>
    </div>
</div>

<div id="loader">
    <i class="fas fa-sync fa-spin fa-3x" style="color: var(--primary)"></i>
    <p style="margin-top:15px; font-weight:bold">Sincronizando...</p>
</div>

<div class="app-container" id="app">
    <aside class="sidebar">
        <div style="padding: 20px; font-weight: 800; color: var(--primary); border-bottom: 2px solid #f1f5f9;">UBICACIONES</div>
        <div id="sidebar-list" style="overflow-y: auto; flex-grow: 1; padding-top: 10px;">
            <div class="state-item active" onclick="resetFilter(this)">NACIONAL (TOTAL)</div>
        </div>
    </aside>

    <main class="main-view">
        <div class="banner">
            <h1 id="view-title" style="margin:0">VENEZUELA</h1>
            <p style="margin:5px 0 0 0; opacity:0.8; font-size:0.8rem">Sala de Seguimiento y Control Operativo</p>
        </div>

        <div class="section-title">Indicadores Críticos</div>
        <div class="grid" id="grid-criticos"></div>

        <div class="section-title">Estatus del Flujo de Denuncia</div>
        <div class="grid" id="grid-estatus"></div>

        <div class="section-title">Fiscalización y Asignación</div>
        <div class="grid" id="grid-fiscal"></div>
    </main>
</div>

<script>
    // DATOS ENCRIPTADOS (Base64)
    // URL: export?format=csv
    const _shD = "aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvMTlUaWFVTzk4TGNEYVZzaGkyVGI5Q0pkcm12dDA4dzJuWEhyWWtySlZMazAvZXhwb3J0P2Zvcm1hdD1jc3YmZ2lkPTA=";
    // Key: 1234
    const _khD = "MTIzNA==";

    function verifyKey() {
        // btoa convierte el input a Base64 para comparar con la clave encriptada
        if (btoa(document.getElementById('passInput').value) === _khD) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('loader').style.display = 'flex';
            fetchData();
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    // Permitir ingreso con tecla Enter
    document.getElementById('passInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') verifyKey();
    });

    async function fetchData() {
        try {
            // atob desencripta la URL en tiempo de ejecución
            const response = await fetch(atob(_shD));
            const data = await response.text();
            
            // Procesamiento de CSV (Manual para evitar librerías externas)
            const rows = data.split('\n').map(row => {
                // Regex para manejar comas dentro de comillas en el CSV
                return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            });

            const headers = rows[0].map(h => h.replace(/"/g, '').trim().toUpperCase());
            
            window.rawData = rows.slice(1).map(row => {
                let obj = {};
                headers.forEach((header, i) => {
                    let val = row[i] ? row[i].replace(/"/g, '').trim() : "0";
                    obj[header] = isNaN(val) || val === "" ? val : Number(val);
                });
                return obj;
            }).filter(d => d.ESTADO);

            renderSidebar();
            updateDashboard(window.rawData);
            document.getElementById('loader').style.display = 'none';
        } catch (e) {
            console.error(e);
            alert("Error de conexión: No se pudo obtener la información.");
        }
    }

    function renderSidebar() {
        const list = document.getElementById('sidebar-list');
        const states = [...new Set(window.rawData.map(d => d.ESTADO))].filter(Boolean).sort();
        states.forEach(s => {
            const div = document.createElement('div');
            div.className = 'state-item';
            div.innerText = s;
            div.onclick = () => {
                updateDashboard(window.rawData.filter(d => d.ESTADO === s), s);
                document.querySelectorAll('.state-item').forEach(i => i.classList.remove('active'));
                div.classList.add('active');
            };
            list.appendChild(div);
        });
    }

    function createCard(label, value, color) {
        return `
            <div class="card">
                <div class="card-label">${label}</div>
                <div class="card-val" style="color:${color}">${(value || 0).toLocaleString()}</div>
            </div>`;
    }

    function updateDashboard(data, title = "VENEZUELA") {
        let s = { 
            RECIBIDOS: 0, ATENDIDAS: 0, PENDIENTES: 0, 
            ADMITIDAS: 0, NO_ADMITIDAS: 0, INSPECCIONADAS: 0, CERRADAS: 0,
            FISCAL_ASIG: 0, FISCAL_NAC: 0, POR_FISCALIZAR: 0
        };
        
        data.forEach(d => {
            s.RECIBIDOS += (Number(d["REGISTROS RECIBIDOS"]) || 0);
            s.ATENDIDAS += (Number(d["ATENDIDAS"]) || 0);
            s.PENDIENTES += (Number(d["POR ATENDER"]) || 0);
            s.ADMITIDAS += (Number(d["DENUNCIAS ADMITIDAS"]) || 0);
            s.NO_ADMITIDAS += (Number(d["DENUNCIAS NO ADMITIDAS"]) || 0);
            s.INSPECCIONADAS += (Number(d["INSPECCIONADO"]) || 0);
            s.CERRADAS += (Number(d["CERRADO"]) || 0);
            s.FISCAL_ASIG += (Number(d["CON FISCAL ASIGNADO"]) || 0);
            s.FISCAL_NAC += (Number(d["CON FISCAL NACIONAL"]) || 0);
            s.POR_FISCALIZAR += (Number(d["POR FISCALIZAR"]) || 0);
        });

        document.getElementById('view-title').innerText = title;
        
        document.getElementById('grid-criticos').innerHTML = 
            createCard("Registros Recibidos", s.RECIBIDOS, "var(--primary)") +
            createCard("Atendidas", s.ATENDIDAS, "var(--success)") +
            createCard("Por Atender", s.PENDIENTES, "var(--danger)");

        document.getElementById('grid-estatus').innerHTML = 
            createCard("Admitidas", s.ADMITIDAS, "#8b5cf6") +
            createCard("No Admitidas", s.NO_ADMITIDAS, "#64748b") +
            createCard("Inspeccionadas", s.INSPECCIONADAS, "#0ea5e9") +
            createCard("Cerradas", s.CERRADAS, "#1e293b");

        document.getElementById('grid-fiscal').innerHTML = 
            createCard("Por Fiscalizar", s.POR_FISCALIZAR, "var(--warning)") +
            createCard("Con Fiscal Asignado", s.FISCAL_ASIG, "var(--accent)") +
            createCard("Con Fiscal Nacional", s.FISCAL_NAC, "var(--primary)");
    }

    function resetFilter(el) {
        updateDashboard(window.rawData);
        document.querySelectorAll('.state-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }
</script>
</body>
</html>
