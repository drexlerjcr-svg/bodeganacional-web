<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Mando Operativa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #1e3a8a; --accent: #3b82f6; --success: #22c55e; 
            --danger: #ef4444; --warning: #f59e0b; --purple: #8b5cf6;
            --bg: #f1f5f9; --white: #ffffff; --text: #1e293b; --muted: #64748b;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--text); overflow: hidden; }
        .app-container { display: flex; height: 100vh; position: relative; }

        .sidebar { 
            width: 260px; min-width: 260px; background: var(--white); border-right: 1px solid #e2e8f0;
            display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 1001;
        }

        .main-view { flex-grow: 1; padding: 20px; overflow-y: auto; height: 100vh; box-sizing: border-box; }

        .banner { 
            background: var(--primary); color: white; padding: 15px 20px; border-radius: 12px; 
            margin-bottom: 20px; box-shadow: var(--shadow);
        }
        .banner h1 { margin: 0; font-size: 1.1rem; text-transform: uppercase; }

        .menu-btn {
            display: none; position: fixed; bottom: 20px; right: 20px;
            background: var(--primary); color: white; width: 55px; height: 55px;
            border-radius: 50%; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 2000; cursor: pointer; font-size: 1.3rem;
        }

        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 12px; margin-bottom: 20px; 
        }

        .card { 
            background: var(--white); padding: 14px; border-radius: 10px; border: 1px solid #e2e8f0;
            box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 5px;
        }
        .card-head { display: flex; justify-content: space-between; align-items: center; }
        .card-label { font-size: 0.6rem; font-weight: 800; color: var(--muted); text-transform: uppercase; }
        .card-val { font-size: 1.3rem; font-weight: 800; }
        
        .section-title { 
            font-size: 0.7rem; font-weight: 800; color: var(--primary); text-transform: uppercase; 
            margin: 20px 0 10px 0; display: flex; align-items: center; gap: 8px;
        }
        .section-title::before { content: ''; width: 3px; height: 14px; background: var(--warning); border-radius: 2px; }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }
        .chart-container {
            background: var(--white); padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0;
            box-shadow: var(--shadow); text-align: center; height: 260px;
            display: flex; flex-direction: column;
        }
        .chart-container h3 { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
        .chart-wrapper { flex-grow: 1; position: relative; }

        @media (max-width: 768px) {
            .sidebar { position: absolute; left: 0; transform: translateX(-100%); height: 100%; }
            .sidebar.open { transform: translateX(0); }
            .menu-btn { display: block; }
            .grid { grid-template-columns: 1fr; }
            .chart-grid { grid-template-columns: 1fr; }
        }

        .state-item { padding: 10px 15px; margin: 2px 10px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 700; color: var(--muted); }
        .state-item.active { background: var(--primary); color: white; }
        #loader { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div id="loader">
    <i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--primary)"></i>
    <p id="loader-text" style="margin-top: 15px; font-weight: 600; color: var(--muted);">Cargando Sistema...</p>
</div>

<button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div style="padding: 20px; font-weight: 800; color: var(--primary); border-bottom: 1px solid #eee; font-size: 0.8rem;">FILTRO TERRITORIAL</div>
        <div id="sidebar-list" style="overflow-y: auto; flex-grow: 1; padding-top: 10px;">
            <div class="state-item active" onclick="resetFilter(this)">NACIONAL (TOTAL)</div>
        </div>
    </aside>

    <main class="main-view">
        <div class="banner">
            <h1 id="view-title">VENEZUELA</h1>
            <div style="font-size: 0.7rem; opacity: 0.8;">Monitoreo Consolidado de Fiscalización</div>
        </div>

        <div class="section-title">Indicadores Críticos</div>
        <div class="grid" id="grid-criticos"></div>

        <div class="section-title">Estatus Operativo</div>
        <div class="grid" id="grid-estatus"></div>

        <div class="section-title">Gestión de Fiscales</div>
        <div class="grid" id="grid-fiscales"></div>

        <div class="section-title">Comparativas Visuales</div>
        <div class="chart-grid">
            <div class="chart-container">
                <h3>Atendidas vs Por Atender</h3>
                <div class="chart-wrapper"><canvas id="chartAtencion"></canvas></div>
            </div>
            <div class="chart-container">
                <h3>Admisión de Denuncias</h3>
                <div class="chart-wrapper"><canvas id="chartAdmision"></canvas></div>
            </div>
            <div class="chart-container">
                <h3>Estatus de Asignación</h3>
                <div class="chart-wrapper"><canvas id="chartFiscales"></canvas></div>
            </div>
        </div>
        <div style="height: 20px;"></div>
    </main>
</div>

<script>
    // URL Ofuscada (Base64)
    const _u = "aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvMTlUaWFVTzk4TGNEYVZzaGkyVGI5Q0pkcm12dDA4dzJuWEhyWWtySlZMazAvZ3Zpei90cT90cXg9b3V0Ompzb24mc2hlZXQ9SG9qYSUyMDE=";
    
    let rawData = [];
    let charts = {};

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function init() {
        try {
            const res = await fetch(atob(_u));
            if (!res.ok) throw new Error("No se pudo conectar con la base de datos.");
            
            const text = await res.text();
            const json = JSON.parse(text.substring(47).slice(0, -2));
            const cols = json.table.cols.map(c => c.label ? c.label.toUpperCase().trim() : "");
            
            rawData = json.table.rows.map(r => {
                let obj = {};
                r.c.forEach((cell, i) => { 
                    if(cols[i]) obj[cols[i]] = cell ? (cell.f || cell.v) : 0; 
                });
                return obj;
            });

            if (rawData.length === 0) throw new Error("El archivo está vacío.");

            renderSidebar();
            updateDashboard(rawData);
            document.getElementById('loader').style.display = 'none';
        } catch (e) { 
            console.error(e); 
            document.getElementById('loader-text').innerText = "Error: " + e.message;
            document.getElementById('loader-text').style.color = "var(--danger)";
        }
    }

    function renderSidebar() {
        const list = document.getElementById('sidebar-list');
        const states = [...new Set(rawData.map(d => d['ESTADO']))].filter(Boolean).sort();
        states.forEach(s => {
            const div = document.createElement('div');
            div.className = 'state-item';
            div.innerText = s;
            div.onclick = () => {
                updateDashboard(rawData.filter(d => d['ESTADO'] === s), s);
                document.querySelectorAll('.state-item').forEach(i => i.classList.remove('active'));
                div.classList.add('active');
                if(window.innerWidth <= 768) toggleMenu();
            };
            list.appendChild(div);
        });
    }

    function createCard(label, value, icon, color) {
        return `
            <div class="card">
                <div class="card-head">
                    <span class="card-label">${label}</span>
                    <i class="fas ${icon}" style="color:${color}; font-size: 0.8rem;"></i>
                </div>
                <div class="card-val" style="color:${color}">${Number(value).toLocaleString()}</div>
            </div>`;
    }

    function updateCharts(s) {
        const opt = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 } } } }
        };

        const config = [
            { id: 'chartAtencion', labels: ['Atendidas', 'Por Atender'], data: [s["ATENDIDAS"], s["POR ATENDER"]], colors: ['#22c55e', '#ef4444'] },
            { id: 'chartAdmision', labels: ['Admitidas', 'No Admitidas'], data: [s["DENUNCIAS ADMITIDAS"], s["DENUNCIAS NO ADMITIDAS"]], colors: ['#8b5cf6', '#64748b'] },
            { id: 'chartFiscales', labels: ['Con Fiscal', 'Por Asignar'], data: [s["CON FISCAL ASIGNADO"], s["POR ASIGNAR FISCAL"]], colors: ['#059669', '#d97706'] }
        ];

        config.forEach(c => {
            if (charts[c.id]) charts[c.id].destroy();
            const ctx = document.getElementById(c.id).getContext('2d');
            charts[c.id] = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: c.labels,
                    datasets: [{ data: c.data, backgroundColor: c.colors, borderWeight: 1 }]
                },
                options: opt
            });
        });
    }

    function updateDashboard(data, title = "VENEZUELA") {
        let s = {};
        // Columnas exactas que usa tu script
        const cols = [
            "REGISTROS RECIBIDOS", "ATENDIDAS", "POR ATENDER", "DENUNCIAS NO ADMITIDAS", 
            "DENUNCIAS ADMITIDAS", "INSPECCIONADO", "CERRADO", "POR ASIGNAR FISCAL", 
            "CON FISCAL ASIGNADO", "CON FISCAL NACIONAL", "OTRA DEPENDENCI"
        ];
        cols.forEach(c => s[c] = 0);
        data.forEach(d => cols.forEach(c => s[c] += Number(d[c]) || 0));

        document.getElementById('view-title').innerText = title;

        document.getElementById('grid-criticos').innerHTML = 
            createCard("Recibidos", s["REGISTROS RECIBIDOS"], "fa-database", "#1e3a8a") +
            createCard("Atendidas", s["ATENDIDAS"], "fa-check-circle", "#22c55e") +
            createCard("Por Atender", s["POR ATENDER"], "fa-clock", "#ef4444");

        document.getElementById('grid-estatus').innerHTML = 
            createCard("Admitidas", s["DENUNCIAS ADMITIDAS"], "fa-file-medical", "#8b5cf6") +
            createCard("No Admitidas", s["DENUNCIAS NO ADMITIDAS"], "fa-ban", "#64748b") +
            createCard("Inspeccionado", s["INSPECCIONADO"], "fa-search-plus", "#0ea5e9") +
            createCard("Cerrado", s["CERRADO"], "fa-archive", "#1e293b");

        document.getElementById('grid-fiscales').innerHTML = 
            createCard("Asignado", s["CON FISCAL ASIGNADO"], "fa-user-shield", "#059669") +
            createCard("Por Asignar", s["POR ASIGNAR FISCAL"], "fa-user-clock", "#d97706") +
            createCard("Nacional", s["CON FISCAL NACIONAL"], "fa-landmark", "#4338ca");

        updateCharts(s);
    }

    function resetFilter(el) {
        updateDashboard(rawData);
        document.querySelectorAll('.state-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        if(window.innerWidth <= 768) toggleMenu();
    }

    window.onload = init;
</script>
</body>
</html>
