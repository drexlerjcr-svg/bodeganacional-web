<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Ejecutivo - Sala de Mando</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3a8a; --secondary: #3b82f6; --bg: #f1f5f9;
            --white: #ffffff; --text: #1e293b; --text-light: #64748b;
            --success: #22c55e; --danger: #ef4444; --warning: #f59e0b;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--text); overflow: hidden; }
        .app-container { display: flex; height: 100vh; }

        /* SIDEBAR ESTILO IMAGEN */
        .sidebar { width: 300px; background: var(--white); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px 20px; font-weight: 800; color: var(--primary); border-bottom: 1px solid #f1f5f9; text-transform: uppercase; font-size: 0.9rem; }
        .state-list { overflow-y: auto; flex-grow: 1; padding: 10px; }
        .state-item { 
            padding: 12px 15px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; 
            font-size: 0.85rem; font-weight: 600; color: var(--text-light); transition: 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .state-item:hover { background: #f8fafc; color: var(--primary); }
        .state-item.active { background: var(--primary); color: white; }

        /* CONTENIDO PRINCIPAL */
        .main-content { flex-grow: 1; padding: 30px; overflow-y: auto; }
        
        /* BANNER TITULO */
        .top-banner { 
            background: var(--primary); color: white; padding: 25px; border-radius: 12px; 
            margin-bottom: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .top-banner h1 { margin: 0; font-size: 1.6rem; letter-spacing: 1px; }
        .top-banner p { margin: 5px 0 0; opacity: 0.8; font-size: 0.9rem; }

        /* KPIs SUPERIORES */
        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .kpi-card { 
            background: white; padding: 25px; border-radius: 12px; border-top: 5px solid #cbd5e1;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .kpi-card.blue { border-top-color: var(--secondary); }
        .kpi-card.green { border-top-color: var(--success); }
        .kpi-card.red { border-top-color: var(--danger); }
        .kpi-label { font-size: 0.75rem; font-weight: 800; color: var(--text-light); text-transform: uppercase; }
        .kpi-value { font-size: 2.5rem; font-weight: 800; display: block; margin-top: 10px; }

        /* LISTADO DE ESTATUS (ESTILO RANKING) */
        .status-panel { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .status-title { font-weight: 800; margin-bottom: 20px; color: var(--primary); text-transform: uppercase; font-size: 0.9rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        
        .status-row { display: grid; grid-template-columns: 250px 1fr 100px; align-items: center; gap: 20px; margin-bottom: 15px; }
        .status-name { font-size: 0.85rem; font-weight: 700; color: var(--text); }
        .bar-track { background: #e2e8f0; height: 12px; border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 10px; transition: width 1s ease-in-out; }
        .status-number { text-align: right; font-weight: 800; font-size: 1rem; color: var(--primary); }

        #loader { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loader"><i class="fas fa-sync fa-spin fa-3x" style="color: var(--primary)"></i></div>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">Filtro por Ubicación</div>
        <div class="state-list" id="state-selector">
            <div class="state-item active" onclick="resetFilter(this)">
                <span>NACIONAL (TOTAL)</span>
                <i class="fas fa-globe-americas"></i>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-banner">
            <h1 id="view-title">VENEZUELA</h1>
            <p>Sala de Seguimiento y Control Operativo</p>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card blue">
                <span class="kpi-label">REGISTROS RECIBIDOS</span>
                <span class="kpi-value" id="val-recibidos">0</span>
            </div>
            <div class="kpi-card green">
                <span class="kpi-label">ATENDIDAS</span>
                <span class="kpi-value" id="val-atendidas" style="color: var(--success)">0</span>
            </div>
            <div class="kpi-card red">
                <span class="kpi-label">POR ATENDER</span>
                <span class="kpi-value" id="val-pendientes" style="color: var(--danger)">0</span>
            </div>
        </div>

        <div class="status-panel">
            <div class="status-title">Desglose de Estatus Acumulado</div>
            <div id="status-container">
                </div>
        </div>
    </main>
</div>

<script>
    const sheetId = '19TiaUO98LcDaVshi2Tb9CJdrmvt08w2nXHrYkrJVLkQ';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=Hoja 1`;
    let rawData = [];

    async function init() {
        try {
            const res = await fetch(url);
            const text = await res.text();
            const json = JSON.parse(text.substring(47).slice(0, -2));
            const headers = json.table.cols.map(c => c.label ? c.label.toUpperCase().trim() : "");
            
            rawData = json.table.rows.map(r => {
                let obj = {};
                r.c.forEach((cell, i) => { 
                    if(headers[i]) obj[headers[i]] = cell ? (cell.f || cell.v) : 0; 
                });
                return obj;
            });

            // Llenar lista de estados
            const estados = [...new Set(rawData.map(d => d['ESTADO']))].filter(Boolean).sort();
            const selector = document.getElementById('state-selector');
            estados.forEach(est => {
                const div = document.createElement('div');
                div.className = 'state-item';
                div.innerHTML = `<span>${est}</span> <i class="fas fa-chevron-right"></i>`;
                div.onclick = () => filterData(est, div);
                selector.appendChild(div);
            });

            updateUI(rawData);
            document.getElementById('loader').style.display = 'none';
        } catch (e) { console.error("Error cargando Sheets:", e); }
    }

    function updateUI(data, title = "VENEZUELA") {
        let s = { rec: 0, ate: 0, pen: 0, cer: 0, ins: 0, apr: 0, des: 0, con: 0, adm: 0 };
        
        data.forEach(d => {
            s.rec += Number(d['REGISTROS RECIBIDOS']) || 0;
            s.ate += Number(d['ATENDIDAS']) || 0;
            s.pen += Number(d['POR ATENDER']) || 0;
            s.cer += Number(d['CERRADO']) || 0;
            s.ins += Number(d['INSPECCIONADO']) || 0;
            s.apr += Number(d['POR APROBAR FISCALIZACIÓN']) || 0;
            s.des += Number(d['DESESTIMADA']) || 0;
            s.con += Number(d['PROCESO CONCILIATORIO']) || 0;
            s.adm += Number(d['DENUNCIA ADMITIDA']) || 0;
        });

        document.getElementById('view-title').innerText = title;
        document.getElementById('val-recibidos').innerText = s.rec.toLocaleString();
        document.getElementById('val-atendidas').innerText = s.ate.toLocaleString();
        document.getElementById('val-pendientes').innerText = s.pen.toLocaleString();

        const items = [
            { label: 'CERRADAS', val: s.cer, color: '#1e3a8a' },
            { label: 'INSPECCIONADAS', val: s.ins, color: '#3b82f6' },
            { label: 'POR APROBACIÓN FISCALIZACIÓN', val: s.apr, color: '#f59e0b' },
            { label: 'DESESTIMADAS', val: s.des, color: '#ef4444' },
            { label: 'PROCESO CONCILIATORIO', val: s.con, color: '#10b981' },
            { label: 'DENUNCIA ADMITIDA', val: s.adm, color: '#8b5cf6' }
        ];

        const max = Math.max(...items.map(i => i.val)) || 1;
        document.getElementById('status-container').innerHTML = items.map(i => `
            <div class="status-row">
                <div class="status-name">${i.label}</div>
                <div class="bar-track"><div class="bar-fill" style="width: ${(i.val/max)*100}%; background: ${i.color}"></div></div>
                <div class="status-number">${i.val.toLocaleString()}</div>
            </div>
        `).join('');
    }

    function filterData(state, el) {
        const filtered = rawData.filter(d => d['ESTADO'] === state);
        updateUI(filtered, state);
        document.querySelectorAll('.state-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.querySelector('.main-content').scrollTop = 0;
    }

    function resetFilter(el) {
        updateUI(rawData);
        document.querySelectorAll('.state-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    init();
</script>
</body>
</html>
