<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.M.O. - Sala de Mando Operativa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3a8a; --accent: #3b82f6; --success: #22c55e; 
            --danger: #ef4444; --warning: #f59e0b; --bg: #f1f5f9; --white: #ffffff;
            --text: #1e293b; --muted: #64748b;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; overflow: hidden; color: var(--text); }
        
        /* Pantalla de Login */
        #lock-screen { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 5000; }
        .lock-box { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .lock-box input { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #e2e8f0; border-radius: 10px; text-align: center; font-size: 1.1rem; }
        .lock-box button { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Estructura App */
        .app-container { display: none; height: 100vh; }
        .sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .main-view { flex-grow: 1; padding: 25px; overflow-y: auto; }
        
        .banner { background: var(--primary); color: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .section-title { font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin: 25px 0 15px 0; display: flex; align-items: center; gap: 10px; }

        /* Estilo de Tarjetas y Barras */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; border-top: 4px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-label { font-size: 0.7rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
        .card-val { font-size: 2.2rem; font-weight: 800; }

        .progress-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .progress-row { display: flex; align-items: center; margin-bottom: 15px; gap: 15px; }
        .prog-label { width: 200px; font-size: 0.75rem; font-weight: 700; color: var(--text); }
        .prog-bar-bg { flex-grow: 1; height: 12px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
        .prog-bar-fill { height: 100%; border-radius: 10px; transition: width 0.5s ease; }
        .prog-val { width: 60px; text-align: right; font-weight: 800; font-size: 0.9rem; }

        .state-item { padding: 12px 15px; margin: 2px 10px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 700; color: var(--muted); }
        .state-item.active { background: var(--primary); color: white; }
        #loader { position: fixed; inset: 0; background: white; display: none; justify-content: center; align-items: center; z-index: 4000; flex-direction: column; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-box">
        <i class="fas fa-shield-alt fa-3x" style="color:var(--primary)"></i>
        <h2>Acceso Restringido</h2>
        <input type="password" id="passInput" placeholder="Contraseña">
        <button onclick="verifyKey()">INGRESAR</button>
        <p id="error-msg" style="color:red; display:none; margin-top:10px;">Clave incorrecta</p>
    </div>
</div>

<div id="loader">
    <i class="fas fa-sync fa-spin fa-3x" style="color: var(--primary)"></i>
    <p style="margin-top:15px; font-weight:bold">Cargando Datos de Fiscalización...</p>
</div>

<div class="app-container" id="app">
    <aside class="sidebar">
        <div style="padding: 20px; font-weight: 800; color: var(--primary); border-bottom: 2px solid #f1f5f9;">UBICACIONES</div>
        <div id="sidebar-list" style="overflow-y: auto; flex-grow: 1; padding-top: 10px;">
            <div class="state-item active" onclick="resetFilter(this)">NACIONAL (TOTAL)</div>
        </div>
    </aside>

    <main class="main-view">
        <div class="banner">
            <h1 id="view-title" style="margin:0">VENEZUELA</h1>
            <p style="margin:5px 0 0 0; opacity:0.8; font-size:0.8rem">Sala de Seguimiento y Control Operativo</p>
        </div>

        <div class="grid" id="grid-principales"></div>

        <div class="section-title">Desglose de Estatus Acumulado</div>
        <div class="progress-container" id="desglose-estatus"></div>
    </main>
</div>

<script>
    // URL y Key Encriptados
    const _u = "aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvMTlUaWFVTzk4TGNEYVZzaGkyVGI5Q0pkcm12dDA4dzJuWEhyWWtySlZMazAvZXhwb3J0P2Zvcm1hdD1jc3Y=";
    const _k = "MTIzNA==";

    function verifyKey() {
        if (btoa(document.getElementById('passInput').value) === _k) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('loader').style.display = 'flex';
            fetchData();
        } else { document.getElementById('error-msg').style.display = 'block'; }
    }

    async function fetchData() {
        try {
            const res = await fetch(atob(_u));
            const csv = await res.text();
            const lines = csv.split('\n').map(l => l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
            const headers = lines[0].map(h => h.replace(/"/g, '').trim().toUpperCase());
            
            window.db = lines.slice(1).map(row => {
                let o = {};
                headers.forEach((h, i) => {
                    let v = row[i] ? row[i].replace(/"/g, '').trim() : "0";
                    o[h] = isNaN(v) || v === "" ? v : Number(v);
                });
                return o;
            }).filter(d => d.ESTADO);

            renderSidebar();
            updateDash(window.db);
            document.getElementById('loader').style.display = 'none';
        } catch (e) { alert("Error al cargar datos. Verifique conexión."); }
    }

    function renderSidebar() {
        const list = document.getElementById('sidebar-list');
        const states = [...new Set(window.db.map(d => d.ESTADO))].filter(Boolean).sort();
        states.forEach(s => {
            const div = document.createElement('div');
            div.className = 'state-item';
            div.innerText = s;
            div.onclick = () => {
                updateDash(window.db.filter(d => d.ESTADO === s), s);
                document.querySelectorAll('.state-item').forEach(i => i.classList.remove('active'));
                div.classList.add('active');
            };
            list.appendChild(div);
        });
    }

    function updateDash(data, title = "VENEZUELA") {
        let s = { REC: 0, ATEN: 0, PEND: 0, CER: 0, INSP: 0, FISC: 0, DES: 0, CONC: 0, ADM: 0 };
        
        data.forEach(d => {
            s.REC += (d["REGISTROS RECIBIDOS"] || 0);
            s.ATEN += (d["ATENDIDAS"] || 0);
            s.PEND += (d["POR ATENDER"] || 0);
            s.CER += (d["CERRADO"] || 0);
            s.INSP += (d["INSPECCIONADO"] || 0);
            s.FISC += (d["POR FISCALIZAR"] || 0); // O "POR APROBACIÓN FISCALIZACIÓN" según tu Excel
            s.DES += (d["DENUNCIAS NO ADMITIDAS"] || 0); // Mapeado a "Desestimadas"
            s.CONC += (d["PROCESO CONCILIATORIO"] || 0);
            s.ADM += (d["DENUNCIAS ADMITIDAS"] || 0);
        });

        document.getElementById('view-title').innerText = title;
        
        // Tarjetas superiores
        document.getElementById('grid-principales').innerHTML = `
            <div class="card" style="border-top-color: var(--accent)">
                <div class="card-label">REGISTROS RECIBIDOS</div>
                <div class="card-val">${s.REC.toLocaleString()}</div>
            </div>
            <div class="card" style="border-top-color: var(--success)">
                <div class="card-label">ATENDIDAS</div>
                <div class="card-val" style="color:var(--success)">${s.ATEN.toLocaleString()}</div>
            </div>
            <div class="card" style="border-top-color: var(--danger)">
                <div class="card-label">POR ATENDER</div>
                <div class="card-val" style="color:var(--danger)">${s.PEND.toLocaleString()}</div>
            </div>`;

        // Barras de progreso
        const max = s.REC || 1;
        const renderBar = (label, val, color) => `
            <div class="progress-row">
                <div class="prog-label">${label}</div>
                <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${(val/max)*100}%; background:${color}"></div></div>
                <div class="prog-val">${val.toLocaleString()}</div>
            </div>`;

        document.getElementById('desglose-estatus').innerHTML = 
            renderBar("CERRADAS", s.CER, "#1e3a8a") +
            renderBar("INSPECCIONADAS", s.INSP, "#3b82f6") +
            renderBar("POR FISCALIZACIÓN", s.FISC, "#f59e0b") +
            renderBar("DESESTIMADAS", s.DES, "#ef4444") +
            renderBar("PROCESO CONCILIATORIO", s.CONC, "#10b981") +
            renderBar("DENUNCIA ADMITIDA", s.ADM, "#94a3b8");
    }

    function resetFilter(el) {
        updateDash(window.db);
        document.querySelectorAll('.state-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }
</script>
</body>
</html>
