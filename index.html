<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Mando - Diseño por Tarjetas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3a8a; --secondary: #3b82f6; --bg: #f4f7fa;
            --white: #ffffff; --text: #1e293b; --text-light: #64748b;
            --success: #22c55e; --danger: #ef4444; --warning: #f59e0b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; color: var(--text); overflow: hidden; }
        .app-container { display: flex; height: 100vh; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: var(--white); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px 20px; font-weight: 800; color: var(--primary); border-bottom: 2px solid var(--bg); text-transform: uppercase; font-size: 0.85rem; }
        .state-list { overflow-y: auto; flex-grow: 1; padding: 10px; }
        .state-item { 
            padding: 12px 15px; margin-bottom: 5px; border-radius: 10px; cursor: pointer; 
            font-size: 0.8rem; font-weight: 700; color: var(--text-light); transition: 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .state-item:hover { background: #f1f5f9; color: var(--primary); }
        .state-item.active { background: var(--primary); color: white; box-shadow: var(--shadow); }

        /* CONTENIDO PRINCIPAL */
        .main-content { flex-grow: 1; padding: 25px; overflow-y: auto; }
        
        .header-blue { 
            background: var(--primary); color: white; padding: 20px 30px; border-radius: 15px; 
            margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow);
        }
        .header-blue h1 { margin: 0; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 1px; }

        /* KPIs SUPERIORES */
        .section-label { font-weight: 800; font-size: 0.75rem; color: var(--primary); text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .section-label::before { content: ''; width: 4px; height: 15px; background: var(--primary); border-radius: 2px; }

        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        
        /* CARD ESTILO IMAGEN 2 */
        .card { 
            background: var(--white); padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0;
            box-shadow: var(--shadow); position: relative; overflow: hidden;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-3px); }
        .card-header-line { position: absolute; top: 0; left: 0; width: 100%; height: 5px; }
        
        .val-large { font-size: 2.2rem; font-weight: 800; display: block; margin-bottom: 5px; }
        .label-sub { font-size: 0.7rem; font-weight: 700; color: var(--text-light); text-transform: uppercase; line-height: 1.2; }

        /* DESGLOSE EN CARDS INDEPENDIENTES */
        .grid-status { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .status-card { display: flex; align-items: center; gap: 15px; }
        .status-icon { width: 45px; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .status-info { display: flex; flex-direction: column; }
        .status-val { font-size: 1.3rem; font-weight: 800; }

        #loader { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 999; }
    </style>
</head>
<body>

<div id="loader"><i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--primary)"></i></div>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">Distribución por Estado</div>
        <div class="state-list" id="state-selector">
            <div class="state-item active" onclick="resetFilter(this)">
                <span>TOTAL NACIONAL</span>
                <i class="fas fa-globe"></i>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="header-blue">
            <div>
                <h1 id="view-title">VENEZUELA (TOTAL NACIONAL)</h1>
                <div style="font-size: 0.8rem; opacity: 0.8; margin-top: 5px;">Seguimiento en Tiempo Real</div>
            </div>
            <i class="fas fa-database fa-2x" style="opacity: 0.5;"></i>
        </div>

        <div class="section-label">Resumen General del Operativo</div>
        <div class="grid-3">
            <div class="card">
                <div class="card-header-line" style="background: var(--secondary);"></div>
                <span class="val-large" id="val-recibidos" style="color: var(--primary);">0</span>
                <span class="label-sub">Registros<br>Recibidos</span>
            </div>
            <div class="card">
                <div class="card-header-line" style="background: var(--success);"></div>
                <span class="val-large" id="val-atendidas" style="color: var(--success);">0</span>
                <span class="label-sub">Denuncias<br>Atendidas</span>
            </div>
            <div class="card">
                <div class="card-header-line" style="background: var(--danger);"></div>
                <span class="val-large" id="val-pendientes" style="color: var(--danger);">0</span>
                <span class="label-sub">Pendientes<br>por Atender</span>
            </div>
        </div>

        <div class="section-label">Desglose de Estatus Acumulado</div>
        <div class="grid-status" id="status-cards-container">
            </div>
    </main>
</div>

<script>
    const sheetId = '19TiaUO98LcDaVshi2Tb9CJdrmvt08w2nXHrYkrJVLkQ';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=Hoja 1`;
    let rawData = [];

    async function init() {
        try {
            const res = await fetch(url);
            const text = await res.text();
            const json = JSON.parse(text.substring(47).slice(0, -2));
            const headers = json.table.cols.map(c => c.label ? c.label.toUpperCase().trim() : "");
            
            rawData = json.table.rows.map(r => {
                let obj = {};
                r.c.forEach((cell, i) => { if(headers[i]) obj[headers[i]] = cell ? (cell.f || cell.v) : 0; });
                return obj;
            });

            const estados = [...new Set(rawData.map(d => d['ESTADO']))].filter(Boolean).sort();
            const selector = document.getElementById('state-selector');
            estados.forEach(est => {
                const div = document.createElement('div');
                div.className = 'state-item';
                div.innerHTML = `<span>${est}</span> <i class="fas fa-chevron-right" style="font-size:0.6rem"></i>`;
                div.onclick = () => filterData(est, div);
                selector.appendChild(div);
            });

            updateUI(rawData);
            document.getElementById('loader').style.display = 'none';
        } catch (e) { console.error(e); }
    }

    function updateUI(data, title = "VENEZUELA (TOTAL NACIONAL)") {
        let s = { rec: 0, ate: 0, pen: 0, cer: 0, ins: 0, apr: 0, des: 0, con: 0, adm: 0 };
        data.forEach(d => {
            s.rec += Number(d['REGISTROS RECIBIDOS']) || 0;
            s.ate += Number(d['ATENDIDAS']) || 0;
            s.pen += Number(d['POR ATENDER']) || 0;
            s.cer += Number(d['CERRADO']) || 0;
            s.ins += Number(d['INSPECCIONADO']) || 0;
            s.apr += Number(d['POR APROBAR FISCALIZACIÓN']) || 0;
            s.des += Number(d['DESESTIMADA']) || 0;
            s.con += Number(d['PROCESO CONCILIATORIO']) || 0;
            s.adm += Number(d['DENUNCIA ADMITIDA']) || 0;
        });

        document.getElementById('view-title').innerText = title;
        document.getElementById('val-recibidos').innerText = s.rec.toLocaleString();
        document.getElementById('val-atendidas').innerText = s.ate.toLocaleString();
        document.getElementById('val-pendientes').innerText = s.pen.toLocaleString();

        const statusItems = [
            { label: 'Denuncias Cerradas', val: s.cer, icon: 'fa-check-double', color: '#1e3a8a' },
            { label: 'Inspeccionadas', val: s.ins, icon: 'fa-search', color: '#3b82f6' },
            { label: 'Por Aprobar fiscalización', val: s.apr, icon: 'fa-clock', color: '#f59e0b' },
            { label: 'Denuncias Desestimadas', val: s.des, icon: 'fa-times-circle', color: '#ef4444' },
            { label: 'Proceso Conciliatorio', val: s.con, icon: 'fa-handshake', color: '#10b981' },
            { label: 'Denuncias Admitidas', val: s.adm, icon: 'fa-file-import', color: '#8b5cf6' }
        ];

        document.getElementById('status-cards-container').innerHTML = statusItems.map(item => `
            <div class="card status-card">
                <div class="status-icon" style="background: ${item.color}20; color: ${item.color}">
                    <i class="fas ${item.icon}"></i>
                </div>
                <div class="status-info">
                    <span class="status-val" style="color: ${item.color}">${item.val.toLocaleString()}</span>
                    <span class="label-sub">${item.label}</span>
                </div>
            </div>
        `).join('');
    }

    function filterData(state, el) {
        const filtered = rawData.filter(d => d['ESTADO'] === state);
        updateUI(filtered, state);
        document.querySelectorAll('.state-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    function resetFilter(el) {
        updateUI(rawData);
        document.querySelectorAll('.state-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    init();
</script>
</body>
</html>
